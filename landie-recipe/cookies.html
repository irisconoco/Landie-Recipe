<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>杏仁薄脆餅 🍪 | Landie Recipe</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --warm-white: #FDF9F4;
    --oat: #C4956A;
    --oat-light: #E8D5BE;
    --oat-dark: #9B6E47;
    --sage: #A8B5A0;
    --sage-light: #D4DDCF;
    --sage-dark: #718069;
    --brown: #5C4033;
    --text: #3D2B1F;
    --text-light: #7A6054;
    --text-muted: #A89080;
    --card-bg: #FFFFFF;
    --shadow-soft: 0 4px 20px rgba(92,64,51,0.08);
    --shadow-card: 0 2px 12px rgba(92,64,51,0.10);
    --radius: 20px;
    --radius-sm: 12px;
    --radius-xs: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--cream);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(196,149,106,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(168,181,160,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 10%, rgba(232,213,190,0.12) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
    padding: 0 16px 80px;
    position: relative;
    z-index: 1;
  }

  /* ── NAV ── */
  .recipe-nav { padding: 16px 4px 0; }
  .nav-back {
    display: inline-flex; align-items: center; gap: 5px;
    text-decoration: none; color: var(--text-muted); font-size: 12px;
    padding: 6px 14px; border-radius: 100px;
    border: 1px solid var(--oat-light); background: var(--card-bg);
    transition: all 0.2s; box-shadow: 0 1px 6px rgba(92,64,51,0.07);
  }
  .nav-back:hover { color: var(--brown); border-color: var(--oat); background: var(--oat-light); }
  .nav-back svg { width: 12px; height: 12px; flex-shrink: 0; }

  /* ── LOGO ── */
  .logo-wrapper {
    text-align: center;
    padding: 32px 20px 16px;
    animation: fadeDown 0.6s ease both;
  }
  .logo-wrapper img {
    max-height: 72px;
    max-width: 180px;
    object-fit: contain;
  }

  /* ── UTILITY BAR ── */
  .util-bar {
    display: flex; align-items: center; justify-content: flex-end;
    gap: 8px; padding: 0 4px 10px;
    animation: fadeDown 0.5s ease both 0.1s;
  }
  .lang-btn {
    display: flex; align-items: center; gap: 6px; padding: 7px 14px;
    background: var(--card-bg); border: 1px solid var(--oat-light); border-radius: 100px;
    font-family: 'Noto Sans TC', sans-serif; font-size: 12px; color: var(--text-light);
    cursor: pointer; transition: all 0.2s; box-shadow: 0 1px 6px rgba(92,64,51,0.07); white-space: nowrap;
  }
  .lang-btn:hover { color: var(--brown); border-color: var(--oat); background: var(--oat-light); }
  .lang-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
  .lang-opt { opacity: 0.45; transition: all 0.2s; }
  .lang-opt.active { opacity: 1; color: var(--brown); font-weight: 600; }
  /* ── FONT SIZE PILL (floating, bottom-right) ── */
  .font-pill {
    position: fixed; bottom: 28px; right: 20px; z-index: 998;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    filter: drop-shadow(0 4px 16px rgba(92,64,51,0.15));
  }
  .font-pill-label {
    font-family: 'Noto Sans TC', sans-serif; font-size: 10px;
    color: var(--text-muted); letter-spacing: 0.05em;
  }
  .font-pill-ctrl {
    display: flex; align-items: center;
    background: var(--card-bg); border: 1.5px solid var(--oat-light); border-radius: 100px;
    overflow: hidden;
  }
  .font-pill-btn {
    display: flex; align-items: center; justify-content: center; gap: 1px;
    width: 54px; height: 54px; border: none; background: transparent;
    cursor: pointer; transition: background 0.18s, color 0.18s;
    color: var(--text-light); font-family: 'Noto Sans TC', sans-serif;
    font-weight: 500; line-height: 1;
  }
  .font-pill-btn:hover:not(:disabled) { background: var(--oat-light); color: var(--brown); }
  .font-pill-btn:disabled { opacity: 0.22; cursor: not-allowed; }
  .font-pill-btn .fpb-s { font-size: 9px; font-weight: 700; color: var(--oat); vertical-align: super; }
  .font-pill-dots {
    display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 0 10px;
    border-left: 1px solid var(--oat-light); border-right: 1px solid var(--oat-light);
  }
  .font-dot {
    width: 5px; height: 5px; border-radius: 50%; background: var(--oat-light);
    transition: background 0.2s, transform 0.2s;
  }
  .font-dot.active { background: var(--oat); transform: scale(1.3); }

  /* ── HERO ── */
  .hero {
    background: linear-gradient(135deg, #FFF8F0 0%, #F5F8F3 100%);
    border-radius: var(--radius);
    box-shadow: var(--shadow-soft);
    border: 1px solid var(--oat-light);
    text-align: center;
    padding: 36px 28px 30px;
    margin-bottom: 28px;
    animation: fadeDown 0.7s ease both;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -50px; right: -50px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(196,149,106,0.13) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -50px; left: -50px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(168,181,160,0.13) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-emoji-wrap {
    width: 76px; height: 76px;
    background: linear-gradient(135deg, var(--oat-light), var(--sage-light));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 36px;
    box-shadow: 0 4px 16px rgba(196,149,106,0.28);
    animation: bounceIn 0.8s ease both 0.2s;
    position: relative; z-index: 1;
  }
  .hero h1 {
    font-family: 'Playfair Display', 'Noto Serif TC', serif;
    font-size: clamp(26px, 5.5vw, 40px);
    font-weight: 700;
    color: var(--brown);
    line-height: 1.2;
    margin-bottom: 8px;
    position: relative; z-index: 1;
  }
  .hero-sub {
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    font-style: italic;
    position: relative; z-index: 1;
  }
  .hero-divider {
    width: 48px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--oat), transparent);
    border-radius: 2px;
    margin: 20px auto 18px;
    position: relative; z-index: 1;
  }
  .hero-chips {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 8px; position: relative; z-index: 1;
  }
  .hero-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 14px;
    background: rgba(255,255,255,0.75);
    border-radius: 100px;
    font-size: 12px; color: var(--text-light); font-weight: 400;
    border: 1px solid var(--oat-light);
    backdrop-filter: blur(4px);
  }
  .hero-chip strong { color: var(--oat-dark); font-weight: 600; }

  /* ── CONTROL PANEL ── */
  .control-panel {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow-soft);
    margin-bottom: 28px;
    animation: fadeUp 0.6s ease both 0.2s;
  }
  .control-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
  }
  .control-group { flex: 1; min-width: 200px; }
  .control-label {
    font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--text-muted);
    margin-bottom: 10px; display: block;
  }
  .type-tabs {
    display: flex; background: var(--cream);
    border-radius: var(--radius-sm); padding: 4px; gap: 2px;
  }
  .type-tab {
    flex: 1; padding: 8px 6px; border: none; background: transparent;
    border-radius: var(--radius-xs);
    font-family: 'Noto Sans TC', sans-serif; font-size: 12px; font-weight: 400;
    color: var(--text-muted); cursor: pointer; transition: all 0.25s ease;
    text-align: center; line-height: 1.3;
  }
  .type-tab.active {
    background: var(--card-bg); color: var(--oat-dark); font-weight: 500;
    box-shadow: 0 2px 8px rgba(92,64,51,0.12);
  }
  .type-tab:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.6); }
  .stepper {
    display: flex; align-items: center; gap: 0;
    background: var(--cream); border-radius: var(--radius-sm);
    overflow: hidden; width: fit-content;
  }
  .stepper-btn {
    width: 44px; height: 44px; border: none; background: transparent;
    color: var(--oat-dark); font-size: 22px; cursor: pointer;
    transition: all 0.2s ease;
    display: flex; align-items: center; justify-content: center; font-weight: 300;
  }
  .stepper-btn:hover { background: var(--oat-light); }
  .stepper-btn:active { transform: scale(0.92); }
  .stepper-val {
    min-width: 56px; text-align: center;
    font-family: 'Noto Serif TC', serif; font-size: 20px; font-weight: 600; color: var(--brown);
  }
  .stepper-unit { font-size: 11px; color: var(--text-muted); padding-right: 12px; font-weight: 400; }
  .control-divider { width: 1px; height: 50px; background: var(--oat-light); flex-shrink: 0; }
  .unit-toggle {
    display: flex; background: var(--cream);
    border-radius: var(--radius-sm); padding: 4px; gap: 4px;
  }
  .unit-btn {
    padding: 10px 20px; border: none; background: transparent;
    border-radius: var(--radius-xs);
    font-family: 'Noto Sans TC', sans-serif; font-size: 14px; font-weight: 500;
    color: var(--text-muted); cursor: pointer; transition: all 0.25s ease;
  }
  .unit-btn.active { background: var(--oat); color: white; box-shadow: 0 2px 10px rgba(196,149,106,0.35); }
  .unit-btn:hover:not(.active) { color: var(--text); }
  .serving-summary {
    margin-top: 16px; padding: 12px 16px;
    background: linear-gradient(135deg, var(--oat-light), var(--sage-light));
    border-radius: var(--radius-xs);
    font-size: 13px; color: var(--brown); text-align: center;
    font-weight: 500; letter-spacing: 0.02em;
  }

  /* ── INGREDIENTS LIST ── */
  .ingredients-card {
    background: var(--card-bg); border-radius: var(--radius);
    padding: 24px 8px 8px; box-shadow: var(--shadow-soft);
    margin-bottom: 28px; animation: fadeUp 0.6s ease both 0.3s;
  }
  .ing-group { margin-bottom: 8px; }
  .ing-group:last-child { margin-bottom: 0; }
  .ing-group-label {
    font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--text-muted);
    padding: 0 16px 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .ing-group-label em { font-style: italic; text-transform: none; letter-spacing: 0.04em; font-weight: 400; }
  .ing-group-label::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--oat-light), transparent);
  }

  /* ── ING CARD HAVE STATE ── */
  .ing-card.selectable { cursor: pointer; user-select: none; }
  .ing-card-check {
    position: absolute; top: 7px; right: 7px;
    width: 20px; height: 20px; border-radius: 50%;
    border: 1.5px solid var(--oat-light); background: white;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; transition: all 0.2s ease; color: transparent;
  }
  .ing-card.have { opacity: 0.45; }
  .ing-card.have .ing-card-check { background: var(--sage); border-color: var(--sage-dark); color: white; }
  .ing-card.have .ing-name { text-decoration: line-through; text-decoration-color: var(--text-muted); }

  /* ── SELECT MODE BANNER ── */
  .select-banner {
    margin: 0 8px 14px; padding: 14px 16px;
    background: linear-gradient(135deg, var(--sage-light) 0%, var(--oat-light) 100%);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; gap: 12px;
  }
  .select-banner-icon { font-size: 22px; flex-shrink: 0; }
  .select-banner-body { flex: 1; }
  .select-banner-title { font-family: 'Noto Serif TC', serif; font-size: 14px; font-weight: 600; color: var(--brown); margin-bottom: 3px; }
  .select-banner-hint { font-size: 11px; color: var(--text-muted); line-height: 1.5; }
  .select-banner-hint strong { color: var(--oat-dark); }
  .select-banner-cancel {
    border: none; background: rgba(255,255,255,0.65); color: var(--text-muted);
    font-family: 'Noto Sans TC', sans-serif; font-size: 12px;
    padding: 6px 12px; border-radius: 100px; cursor: pointer;
    transition: all 0.2s; flex-shrink: 0;
  }
  .select-banner-cancel:hover { background: white; color: var(--brown); }
  .shop-generate-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: calc(100% - 32px); margin: 10px 16px 16px; padding: 14px 20px;
    background: linear-gradient(135deg, var(--oat), var(--oat-dark));
    color: white; border: none; border-radius: var(--radius-sm);
    font-family: 'Noto Sans TC', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.25s ease;
    box-shadow: 0 4px 16px rgba(196,149,106,0.35);
  }
  .shop-generate-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(196,149,106,0.45); }
  .shop-generate-btn:active { transform: none; }
  .shop-generate-btn svg { width: 16px; height: 16px; }
  .shop-entry-btn {
    display: flex; align-items: center; gap: 14px;
    width: calc(100% - 32px); margin: 8px 16px 16px; padding: 14px 18px;
    border: 1.5px dashed var(--oat-light); border-radius: var(--radius-sm);
    background: transparent; cursor: pointer; transition: all 0.25s ease; text-align: left;
  }
  .shop-entry-btn:hover { border-style: solid; border-color: var(--oat); background: linear-gradient(135deg, rgba(196,149,106,0.05), rgba(168,181,160,0.05)); }
  .shop-entry-icon { width: 42px; height: 42px; background: linear-gradient(135deg, var(--oat-light), var(--sage-light)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .shop-entry-text { flex: 1; }
  .shop-entry-text strong { display: block; font-size: 13px; color: var(--brown); font-weight: 600; margin-bottom: 3px; }
  .shop-entry-text span { font-size: 11px; color: var(--text-muted); line-height: 1.4; display: block; }
  .shop-entry-arrow { color: var(--oat); flex-shrink: 0; }
  .shop-entry-arrow svg { width: 16px; height: 16px; display: block; }

  /* ── SHOPPING OVERLAY ── */
  .shop-overlay {
    position: fixed; inset: 0; z-index: 200;
    display: flex; flex-direction: column; justify-content: flex-end;
    background: rgba(61,43,31,0); pointer-events: none;
    transition: background 0.3s ease;
  }
  .shop-overlay.active { background: rgba(61,43,31,0.45); pointer-events: all; }
  .shop-sheet {
    background: var(--warm-white); border-radius: 24px 24px 0 0;
    max-height: 88vh; display: flex; flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.38s cubic-bezier(0.34, 1.2, 0.64, 1);
    box-shadow: 0 -8px 40px rgba(92,64,51,0.18);
  }
  .shop-overlay.active .shop-sheet { transform: translateY(0); }
  .shop-handle { width: 36px; height: 4px; background: var(--oat-light); border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; }
  .shop-sheet-header { display: flex; align-items: center; gap: 10px; padding: 16px 20px 14px; border-bottom: 1px solid var(--oat-light); flex-shrink: 0; }
  .shop-back-btn {
    display: flex; align-items: center; gap: 4px;
    border: 1px solid var(--oat-light); border-radius: 100px;
    background: var(--cream); color: var(--text-muted);
    font-family: 'Noto Sans TC', sans-serif; font-size: 12px;
    padding: 5px 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .shop-back-btn:hover { color: var(--brown); border-color: var(--oat); background: var(--oat-light); }
  .shop-back-btn svg { width: 12px; height: 12px; }
  .shop-sheet-title { flex: 1; text-align: center; font-family: 'Noto Serif TC', serif; font-size: 15px; font-weight: 600; color: var(--brown); }
  .shop-close-btn { width: 30px; height: 30px; border-radius: 50%; border: none; background: var(--cream); color: var(--text-muted); font-size: 18px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .shop-close-btn:hover { background: var(--oat-light); color: var(--brown); }
  .shop-sheet-sub { padding: 9px 20px; font-size: 12px; color: var(--text-muted); background: var(--cream); border-bottom: 1px solid var(--oat-light); text-align: center; flex-shrink: 0; }
  .shop-sheet-body { flex: 1; overflow-y: auto; padding: 4px 12px; -webkit-overflow-scrolling: touch; }
  .shopping-group-label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); padding: 12px 8px 4px; }
  .shopping-item { display: flex; align-items: center; gap: 10px; padding: 10px 8px; border-radius: var(--radius-xs); cursor: pointer; transition: background 0.15s; }
  .shopping-item:hover { background: var(--cream); }
  .shopping-item input[type="checkbox"] { display: none; }
  .shopping-check { width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid var(--oat); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; background: white; color: white; }
  .shopping-item.checked .shopping-check { background: var(--sage); border-color: var(--sage-dark); }
  .shopping-item.checked .shopping-name,
  .shopping-item.checked .shopping-amount { text-decoration: line-through; opacity: 0.45; }
  .shopping-emoji { font-size: 18px; flex-shrink: 0; }
  .shopping-name { flex: 1; font-size: 14px; color: var(--text); }
  .shopping-amount { font-size: 12px; color: var(--oat-dark); font-weight: 500; font-family: 'Noto Serif TC', serif; white-space: nowrap; }
  .shopping-amount span { color: var(--text-muted); font-weight: 300; }
  .shop-all-have { text-align: center; padding: 36px 20px; color: var(--text-muted); font-size: 14px; }
  .shop-all-have .all-icon { font-size: 36px; display: block; margin-bottom: 10px; }
  .shop-sheet-footer { display: flex; gap: 8px; padding: 14px 16px; border-top: 1px solid var(--oat-light); background: var(--warm-white); flex-shrink: 0; }
  .action-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 11px 8px; border: 1.5px solid var(--oat-light); border-radius: var(--radius-xs); background: var(--cream); color: var(--text-light); font-family: 'Noto Sans TC', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .action-btn:hover { background: var(--oat-light); color: var(--brown); border-color: var(--oat); }
  .action-btn.copied { background: var(--sage-light); color: var(--sage-dark); border-color: var(--sage); }
  .action-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

  /* ── TOAST ── */
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--brown); color: white; padding: 10px 22px; border-radius: 100px; font-size: 13px; opacity: 0; pointer-events: none; transition: all 0.3s ease; z-index: 999; box-shadow: 0 4px 16px rgba(92,64,51,0.25); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── PRINT ── */
  @media print {
    body * { visibility: hidden; }
    .print-area, .print-area * { visibility: visible; }
    .print-area { position: fixed; left: 0; top: 0; right: 0; padding: 32px; }
    .shop-sheet-footer, .shop-back-btn, .shop-close-btn { display: none !important; }
  }

  /* ── SECTIONS ── */
  .section-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 13px; font-weight: 600; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--oat-dark);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--oat-light), transparent);
  }

  /* ── STEPS ── */
  .steps-wrapper { display: flex; flex-direction: column; gap: 20px; }
  .step-card {
    background: var(--card-bg); border-radius: var(--radius);
    overflow: hidden; box-shadow: var(--shadow-card);
    animation: fadeUp 0.5s ease both; transition: box-shadow 0.3s ease;
  }
  .step-card:hover { box-shadow: 0 8px 32px rgba(92,64,51,0.13); }
  .step-header { display: flex; align-items: center; gap: 14px; padding: 20px 22px 16px; }
  .step-num {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--oat), var(--oat-dark));
    color: white; font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700;

// ── TIMER ──
function playAlertSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.38, 0.76].forEach(t => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.35, ctx.currentTime + t);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.28);
      osc.start(ctx.currentTime + t);
      osc.stop(ctx.currentTime + t + 0.3);
    });
  } catch(e) {}
}

const MOLD_FS = {
  cookie: { icon:'🍪', zh:'杏仁薄脆餅', en:'Almond Crispy Cookies' },
};

const WAIT_MSGS = {
  zh: [
    '✨ 期待感是最好的調味料！',
    '🌡️ 170度的魔法正在施展中...',
    '😌 深呼吸，享受等待的美好時光',

};

let fsTimerType = null;
let fsMsgIndex = 0;
let fsMsgInterval = null;

function openTimerFullscreen(type) {
  fsTimerType = type;
  const m = MOLD_FS[type];
  const isEn = lang === 'en';
  document.getElementById('timer-fs-icon').textContent = m.icon;
  document.getElementById('timer-fs-name').textContent = isEn ? m.en : m.zh;
  document.getElementById('timer-fs-min-btn').textContent = isEn ? '↙ Minimize' : '↙ 收起';
  document.getElementById('timer-fs-cancel-btn').textContent = isEn ? 'Cancel Timer' : '取消計時';
  document.getElementById('timer-fs-cancel-btn').className = 'timer-fs-cancel';
  document.getElementById('timer-fs-digits').classList.remove('done');
  updateFsDisplay();
  startFsMsgRotation();
  document.getElementById('timer-fullscreen').classList.add('active');
}

function minimizeTimer() {
  document.getElementById('timer-fullscreen').classList.remove('active');
  stopFsMsgRotation();
  fsTimerType = null;
}

function cancelFromFullscreen() {
  const type = fsTimerType;
  minimizeTimer();
  if (type) resetTimer(type);
}

function updateFsDisplay() {
  if (!fsTimerType) return;
  const t = TIMERS[fsTimerType];
  const isEn = lang === 'en';
  const mm = String(Math.floor(t.remaining / 60)).padStart(2, '0');
  const ss = String(t.remaining % 60).padStart(2, '0');
  document.getElementById('timer-fs-digits').textContent = `${mm}:${ss}`;
  const total = BAKE_DURATIONS[fsTimerType];
  const pct = ((total - t.remaining) / total) * 100;
  document.getElementById('timer-fs-bar').style.width = `${pct}%`;
  if (t.state === 'done') {
    document.getElementById('timer-fs-digits').classList.add('done');
    document.getElementById('timer-fs-msg').textContent = isEn ? "🔔 Time's up! Take them out!" : '🔔 時間到！可以出爐了！';
    const btn = document.getElementById('timer-fs-cancel-btn');
    btn.textContent = isEn ? 'Close' : '關閉';
    btn.className = 'timer-fs-cancel done-btn';
    stopFsMsgRotation();
  }
}

function startFsMsgRotation() {
  stopFsMsgRotation();
  fsMsgIndex = Math.floor(Math.random() * WAIT_MSGS[lang].length);
  showFsMsg();
  fsMsgInterval = setInterval(() => {
    fsMsgIndex = (fsMsgIndex + 1) % WAIT_MSGS[lang].length;
    const el = document.getElementById('timer-fs-msg');
    if (!el || !fsTimerType) return;
    el.classList.remove('visible'); el.classList.add('fading');
    setTimeout(() => { showFsMsg(); el.classList.remove('fading'); el.classList.add('visible'); }, 420);
  }, 9000);
}

function showFsMsg() {
  const el = document.getElementById('timer-fs-msg');
  if (!el) return;
  el.textContent = WAIT_MSGS[lang][fsMsgIndex];
}

function stopFsMsgRotation() {
  clearInterval(fsMsgInterval);
  fsMsgInterval = null;
}

function startTimer(type) {
  const t = TIMERS[type];
  if (t.state === 'running') { openTimerFullscreen(type); return; }
  t.state = 'running';
  t.intervalId = setInterval(() => tickTimer(type), 1000);
  renderTimerCtrl(type);
  openTimerFullscreen(type);
}

function tickTimer(type) {
  const t = TIMERS[type];
  t.remaining--;
  if (t.remaining <= 0) {
    t.remaining = 0;
    t.state = 'done';
    clearInterval(t.intervalId);
    t.intervalId = null;
    playAlertSound();
    showToast(`🔔 ${lang==='en' ? "Cookies — Time's up!" : '杏仁薄脆餅時間到！'}`);
    if (fsTimerType === type) updateFsDisplay();
  } else {
    if (fsTimerType === type) updateFsDisplay();
  }
  renderTimerCtrl(type);
}

function resetTimer(type) {
  const t = TIMERS[type];
  clearInterval(t.intervalId);
  t.intervalId = null;
  t.state = 'idle';
  t.remaining = BAKE_DURATIONS[type];
  renderTimerCtrl(type);
}

function renderTimerCtrl(type) {
  const el = document.getElementById(`timer-ctrl-${type}`);
  if (!el) return;
  const t = TIMERS[type];
  const isEn = lang === 'en';
  if (t.state === 'idle') {
    el.innerHTML = `<button class="timer-start-btn" onclick="startTimer('${type}')">⏱ ${isEn ? 'Start Timer' : '開始計時'}</button>`;
  } else if (t.state === 'running') {
    const mm = String(Math.floor(t.remaining / 60)).padStart(2, '0');
    const ss = String(t.remaining % 60).padStart(2, '0');
    el.innerHTML = `
      <div class="timer-running" onclick="openTimerFullscreen('${type}')" style="cursor:pointer;" title="${isEn?'Expand timer':'展開計時器'}">
        <span class="timer-digits">${mm}:${ss}</span>
        <button class="timer-cancel-btn" onclick="event.stopPropagation();resetTimer('${type}')" title="${isEn?'Cancel':'取消'}">✕</button>
      </div>`;
  } else {
    el.innerHTML = `
      <div class="timer-done">
        <span class="timer-done-icon">🔔</span>
        <span class="timer-done-text">${isEn ? "Time's up!" : '時間到！'}</span>
        <button class="timer-close-btn" onclick="resetTimer('${type}')">${isEn ? 'Close' : '關閉'}</button>
      </div>`;
  }
}

function handleFileSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  processPhoto(file);
  event.target.value = '';
}

async function processPhoto(file) {
  if (!getApiKey()) {
    document.getElementById('gallery-apikey-row').classList.add('visible');
    document.getElementById('gallery-apikey-input').focus();
    showToast(lang === 'en' ? 'Enter your Anthropic API key first' : '請先輸入 Anthropic API Key');
    return;
  }
  const base64 = await fileToBase64(file);
  const mediaType = file.type || 'image/jpeg';
  const timestamp = new Date().toLocaleString(lang === 'en' ? 'en-US' : 'zh-TW', { dateStyle:'medium', timeStyle:'short' });
  const id = Date.now();
  const entry = { id, base64, mediaType, timestamp, message: null, notes: '' };
  galleryEntries.unshift(entry);
  renderGalleryEntry(entry, true);
  try {
    entry.message = await analyzePhoto(base64, mediaType);
  } catch(e) {
    const isAuth = e.message === '401' || e.message === 'invalid_key';
    const isEn = lang === 'en';
    entry.message = isAuth
      ? (isEn ? '⚠️ Invalid API key — please update it below.' : '⚠️ API Key 無效，請點下方按鈕更新。')
      : (isEn ? '⚠️ Could not analyze photo. Check your connection or API key.' : '⚠️ 無法分析照片，請檢查網路或 API Key。');
    if (isAuth) {
      document.getElementById('gallery-apikey-row').classList.add('visible');
      document.getElementById('gallery-apikey-input').value = '';
      document.getElementById('gallery-apikey-input').focus();
    }
  }
  saveGallery();
  renderGalleryEntry(entry, false);
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function analyzePhoto(base64, mediaType) {
  const isEn = lang === 'en';
  const prompt = isEn
    ? `This is a photo of homemade almond crispy cookies. In 2-3 warm, enthusiastic sentences: if they look successful, give genuine specific praise. If they look like they need improvement, give kind comfort and encouragement. Be emotionally warm. Respond in English only.`
    : `這是一張自製杏仁薄脆餅的照片。請用2-3句充滿情感的語氣：如果成果看起來不錯，給予真誠具體的熱情讚美；如果看起來需要改進，給予溫暖的安慰和繼續努力的鼓勵。只用繁體中文回覆。`;
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': getApiKey(),
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 256,
      messages: [{ role: 'user', content: [
        { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
        { type: 'text', text: prompt }
      ]}]
    })
  });
  if (!resp.ok) throw new Error(`${resp.status}`);
  const data = await resp.json();
  if (!data.content?.[0]?.text) throw new Error('empty_response');
  return data.content[0].text;
}

function saveGallery() {
  try {
    localStorage.setItem('landie-gallery-cookies', JSON.stringify(galleryEntries.slice(0, 15)));
  } catch(e) {
    galleryEntries = galleryEntries.slice(0, 8);
    try { localStorage.setItem('landie-gallery-cookies', JSON.stringify(galleryEntries)); } catch(e2) {}
  }
}

function deleteEntry(id) {
  galleryEntries = galleryEntries.filter(e => e.id !== id);
  saveGallery();
  document.getElementById(`gallery-entry-${id}`)?.remove();
}

function updateNotes(id, notes) {
  const entry = galleryEntries.find(e => e.id === id);
  if (entry) { entry.notes = notes; saveGallery(); }
}

async function shareEntry(id) {
  const entry = galleryEntries.find(e => e.id === id);
  if (!entry) return;
  showToast(lang === 'en' ? 'Preparing share image…' : '準備分享圖片中…');
  try {
    const canvas = await createShareImage(entry);
    canvas.toBlob(async blob => {
      const file = new File([blob], 'almond-crispy-cookies.jpg', { type: 'image/jpeg' });
      if (navigator.share && navigator.canShare?.({ files: [file] })) {
        try {
          await navigator.share({ files: [file], title: '杏仁薄脆餅 Almond Crispy Cookies', text: entry.message || '自製杏仁薄脆餅！' });
          return;
        } catch(e) {}
      }
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'almond-crispy-cookies.jpg';
      a.click();
      showToast(lang === 'en' ? 'Image saved!' : '圖片已儲存！');
    }, 'image/jpeg', 0.92);
  } catch(e) {
    showToast(lang === 'en' ? 'Could not create image' : '圖片建立失敗');
  }
}

async function createShareImage(entry) {
  const SIZE = 1080;
  const canvas = document.createElement('canvas');
  canvas.width = SIZE; canvas.height = SIZE;
  const ctx = canvas.getContext('2d');

  const img = new Image();
  await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = `data:${entry.mediaType};base64,${entry.base64}`; });
  const scale = Math.max(SIZE / img.width, SIZE / img.height);
  const iw = img.width * scale, ih = img.height * scale;
  ctx.drawImage(img, (SIZE - iw) / 2, (SIZE - ih) / 2, iw, ih);

  const grad = ctx.createLinearGradient(0, SIZE * 0.45, 0, SIZE);
  grad.addColorStop(0, 'rgba(40,25,15,0)');
  grad.addColorStop(0.5, 'rgba(40,25,15,0.7)');
  grad.addColorStop(1, 'rgba(40,25,15,0.93)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, SIZE, SIZE);

  ctx.textAlign = 'left';
  ctx.fillStyle = '#E8D5BE';
  ctx.font = 'bold 54px serif';
  ctx.fillText('杏仁薄脆餅 🍪', 60, 700);
  ctx.font = '32px sans-serif';
  ctx.fillStyle = 'rgba(232,213,190,0.75)';
  ctx.fillText('Almond Crispy Cookies', 60, 748);

  if (entry.message) {
    ctx.font = '26px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.82)';
    const words = entry.message.slice(0, 80);
    let line = '', y = 810;
    for (const ch of words) {
      if (ctx.measureText(line + ch).width > 960) { ctx.fillText(line, 60, y); line = ch; y += 38; if (y > 890) break; }
      else line += ch;
    }
    if (line && y <= 890) ctx.fillText(line, 60, y);
  }

  ctx.font = '22px monospace';
  ctx.fillStyle = 'rgba(196,149,106,0.9)';
  ctx.fillText(RECIPE_URL, 60, 1030);

  return canvas;
}

// ── QUANTITY MATH ──
function multiplier() {
  return state.qty / TYPES[state.type].baseQty;
}

function fmtMeasure(key) {
  const d = BASE[key];
  if (!d) return { cup:'', weight:'' };
  const m = multiplier();
  let cupStr = scaleCup(d[0], m);
  let wStr;
  if (typeof d[1] === 'string') {
    const num = parseFloat(d[1].replace('~',''));
    const scaled = Math.round(num * m * 10) / 10;
    if (state.unit === 'g') wStr = `~${scaled}g`;
    else { const o = parseFloat(d[2].replace('~','')); wStr = `~${Math.round(o*m*10)/10}oz`; }
  } else {
    if (state.unit === 'g') wStr = `${Math.round(d[1]*m*10)/10}g`;
    else wStr = `${Math.round(d[2]*m*100)/100}oz`;
  }
  return { cup: cupStr, weight: wStr };
}

function scaleCup(cup, m) {
  if (cup.includes('large') || cup.includes('bananas')) {
    const num = parseFloat(cup);
    const scaled = Math.round(num * m * 10) / 10;
    return `${scaled} ${cup.replace(/[\d.]+\s*/, '')}`;
  }
  const fractions = {'½':0.5,'¼':0.25,'⅓':0.333,'⅔':0.667,'¾':0.75,'⅛':0.125};
  let val = 0, unit = '';
  for (let p of cup.split(' ')) {
    if (fractions[p]) val += fractions[p];
    else if (!isNaN(parseFloat(p))) val += parseFloat(p);
    else unit += (unit?'':' ') + p;
  }
  return `${niceNum(val * m)}${unit}`;
}

function niceNum(n) {
  const fracs = [[1/8,'⅛'],[1/4,'¼'],[1/3,'⅓'],[1/2,'½'],[2/3,'⅔'],[3/4,'¾']];
  const whole = Math.floor(n);
  const rem = n - whole;
  if (rem < 0.04) return whole > 0 ? `${whole}` : '0';
  for (let [v, s] of fracs) {
    if (Math.abs(rem - v) < 0.04) return whole > 0 ? `${whole}${s}` : s;
  }
  return (Math.round(n * 8) / 8).toFixed(2).replace(/\.?0+$/, '');
}

// ── RENDER ──
function renderIngredients() {
  const card = document.getElementById('ingredients-card');
  const inSelectMode = shopMode === 'select';
  const totalItems = INGREDIENT_GROUPS.flatMap(g => g.items).length;
  const needCount = totalItems - haveSet.size;
  const isEn = lang === 'en';
  let html = '';

  if (inSelectMode) {
    html += `
      <div class="select-banner">
        <div class="select-banner-icon">☑️</div>
        <div class="select-banner-body">
          <div class="select-banner-title">${isEn ? 'Mark ingredients you already have' : '勾選你家已有的食材'}</div>
          <div class="select-banner-hint">${isEn
            ? `Tap a card to mark as owned · <strong>${haveSet.size} owned</strong> · <strong>${needCount} to buy</strong>`
            : `點選卡片標記已有 · 已勾選 <strong>${haveSet.size} 項</strong> · 需採購 <strong>${needCount} 項</strong>`}</div>
        </div>
        <button class="select-banner-cancel" onclick="setShopMode(null)">${isEn ? 'Cancel' : '取消'}</button>
      </div>`;
  }

  INGREDIENT_GROUPS.forEach(group => {
    const primary = isEn ? group.labelEn : group.label;
    const secondary = isEn ? group.label : group.labelEn;
    html += `<div class="ing-group">
      <div class="ing-group-label">${primary} <em>${secondary}</em></div>
      <div class="ing-cards">`;
    group.items.forEach(ing => {
      const have = haveSet.has(ing.key);
      const m = fmtMeasure(ing.key);
      const attrs = inSelectMode
        ? `class="ing-card${have?' have':''} selectable" onclick="toggleHave('${ing.key}')"`
        : `class="ing-card"`;
      html += `
        <div ${attrs}>
          ${inSelectMode ? `<div class="ing-card-check">${have ? ICONS.check : ''}</div>` : ''}
          <span class="ing-emoji">${ing.emoji}</span>
          <div class="ing-name">${ingName(ing.key)}</div>
          <div class="ing-cup">${m.cup}</div>
          <div class="ing-weight">${m.weight}</div>
        </div>`;
    });
    html += `</div></div>`;
  });

  if (shopMode === null) {
    html += `
      <button class="shop-entry-btn" onclick="setShopMode('select')">
        <div class="shop-entry-icon">🛒</div>
        <div class="shop-entry-text">
          <strong>${isEn ? 'Create Shopping List' : '建立採購清單'}</strong>
          <span>${isEn ? 'Mark what you have, then generate your buy list' : '勾選家中已有食材，一鍵產生需購買的清單'}</span>
        </div>
        <div class="shop-entry-arrow">${ICONS.chevron}</div>
      </button>`;
  } else if (inSelectMode) {
    html += `
      <button class="shop-generate-btn" onclick="setShopMode('list')">
        ${ICONS.cart} ${isEn ? `Generate List (${needCount} items)` : `產生採購清單（共 ${needCount} 項）`}
      </button>`;
  }

  card.innerHTML = html;
}

function setShopMode(mode) {
  if (mode === null) { haveSet.clear(); shoppingChecked.clear(); }
  shopMode = mode;
  renderIngredients();
  const overlay = document.getElementById('shop-overlay');
  if (mode === 'list') {
    renderShopSheet();
    requestAnimationFrame(() => overlay.classList.add('active'));
  } else {
    overlay.classList.remove('active');
  }
}

function renderShopSheet() {
  const t = TYPES[state.type];
  const needed = INGREDIENT_GROUPS.flatMap(g => g.items.filter(i => !haveSet.has(i.key)));
  const isEn = lang === 'en';
  const ul = t.unitLabel[lang];
  document.getElementById('shop-sheet-sub').textContent = isEn
    ? `${state.qty} ${ul} · ${needed.length} items to buy`
    : `${state.qty} ${ul} · 共需採購 ${needed.length} 項`;

  let html = '';
  if (needed.length === 0) {
    html = `<div class="shop-all-have"><span class="all-icon">✅</span>${isEn ? 'All ingredients ready!' : '所有食材都已備齊！'}</div>`;
  } else {
    html = `<div class="print-area">`;
    html += `<div style="display:none" class="print-only"><strong style="font-size:16px;">${isEn ? 'Shopping List — Almond Crispy Cookies' : '採購清單 — 杏仁薄脆餅'}</strong><br><span style="font-size:12px;color:#888;">${t.summary(state.qty, lang)}</span><br><br></div>`;
    INGREDIENT_GROUPS.forEach(group => {
      const items = group.items.filter(i => !haveSet.has(i.key));
      if (!items.length) return;
      html += `<div class="shopping-group-label">${isEn ? group.labelEn+' · '+group.label : group.label+' · '+group.labelEn}</div>`;
      items.forEach(ing => {
        const checked = shoppingChecked.has(ing.key);
        const m = fmtMeasure(ing.key);
        html += `
          <label class="shopping-item${checked?' checked':''}">
            <input type="checkbox" ${checked?'checked':''} onchange="toggleShoppingCheck('${ing.key}', this.checked)">
            <span class="shopping-check">${checked ? ICONS.check : ''}</span>
            <span class="shopping-emoji">${ing.emoji}</span>
            <span class="shopping-name">${ingName(ing.key)}</span>
            <span class="shopping-amount">${m.cup} <span>/ ${m.weight}</span></span>
          </label>`;
      });
    });
    html += `</div>`;
  }
  document.getElementById('shop-list-body').innerHTML = html;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('shop-overlay')) setShopMode(null);
}

function toggleHave(key) {
  if (shopMode !== 'select') return;
  if (haveSet.has(key)) haveSet.delete(key);
  else { haveSet.add(key); shoppingChecked.delete(key); }
  renderIngredients();
}

function toggleShoppingCheck(key, checked) {
  if (checked) shoppingChecked.add(key);
  else shoppingChecked.delete(key);
  renderShopSheet();
}

function getShoppingText() {
  const t = TYPES[state.type];
  const isEn = lang === 'en';
  const ul = t.unitLabel[lang];
  const lines = isEn
    ? ['🛒 Shopping List', `(Almond Crispy Cookies × ${state.qty} ${ul})`, '']
    : ['🛒 採購清單 Shopping List', `（杏仁薄脆餅 × ${state.qty} ${ul}）`, ''];
  INGREDIENT_GROUPS.forEach(group => {
    const items = group.items.filter(i => !haveSet.has(i.key));
    if (!items.length) return;
    lines.push(isEn ? `[${group.labelEn}]` : `【${group.label}】`);
    items.forEach(ing => {
      const m = fmtMeasure(ing.key);
      lines.push(`□ ${ingName(ing.key)}　${m.cup} / ${m.weight}`);
    });
    lines.push('');
  });
  return lines.join('\n').trim();
}

function printShopping() {
  document.querySelectorAll('.print-only').forEach(el => el.style.display = 'block');
  window.print();
  document.querySelectorAll('.print-only').forEach(el => el.style.display = 'none');
}

async function shareShopping() {
  const text = getShoppingText();
  if (navigator.share) {
    try { await navigator.share({ title: lang==='en' ? 'Shopping List — Almond Crispy Cookies' : '採購清單 — 杏仁薄脆餅', text }); } catch(e) {}
  } else {
    await copyShopping();
  }
}

async function copyShopping() {
  const text = getShoppingText();
  try {
    await navigator.clipboard.writeText(text);
    showToast(lang==='en' ? 'Shopping list copied!' : '已複製採購清單！');
    const btn = document.getElementById('copy-btn');
    if (btn) { btn.classList.add('copied'); setTimeout(() => btn.classList.remove('copied'), 1800); }
  } catch(e) { showToast(lang==='en' ? 'Please copy manually' : '請手動複製'); }
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

function render() {
  const t = TYPES[state.type];
  const ul = t.unitLabel[lang];
  const isEn = lang === 'en';
  document.getElementById('qty-val').textContent = state.qty;
  document.getElementById('qty-unit').textContent = ul;
  document.getElementById('serving-summary').textContent = t.summary(state.qty, lang);

  renderIngredients();
  if (shopMode === 'list') renderShopSheet();
  renderNotes();
  applyLang();

  const wrapper = document.getElementById('steps-wrapper');
  wrapper.innerHTML = '';
  STEPS.forEach((step, idx) => {
    const card = document.createElement('div');
    card.className = 'step-card';
    card.style.animationDelay = `${idx * 0.07}s`;

    let html = `
      <div class="step-header">
        <div class="step-num">${step.num}</div>
        <div>
          <div class="step-title-text">${step.title[lang]}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">${step.title[isEn?'zh':'en']}</div>
        </div>
      </div>
      <div class="step-instruction">${typeof step.instruction[lang] === 'function' ? step.instruction[lang]() : step.instruction[lang]}</div>
    `;

    if (step.bake) {
      html += `<div class="bake-times">
        <div class="bake-badge">
          <div class="bake-badge-info">
            <span class="bake-icon">🍪</span>
            <span>
              <div class="bake-label">${isEn ? 'Convection Oven' : '炫風烤箱'}</div>
              <div class="bake-time">${isEn ? '~15 min · 170°C' : '約 15 分鐘 · 170°C'}</div>
            </span>
          </div>
          <div id="timer-ctrl-cookie"></div>
        </div>
      </div>`;
    }

    if (step.ings.length > 0) {
      html += `<div class="ing-cards">`;
      step.ings.forEach(ing => {
        const m = fmtMeasure(ing.key);
        html += `
          <div class="ing-card">
            <span class="ing-emoji">${ing.emoji}</span>
            <div class="ing-name">${ingName(ing.key)}</div>
            <div class="ing-cup">${m.cup}</div>
            <div class="ing-weight">${m.weight}</div>
          </div>`;
      });
      html += `</div>`;
    }

    card.innerHTML = html;
    wrapper.appendChild(card);
  });
  renderTimerCtrl('cookie');
}

function setType(type) {
  state.type = type;
  state.qty = TYPES[type].baseQty;
  document.querySelectorAll('.type-tab').forEach((b,i) => {
    b.classList.toggle('active', ['half','full','double'][i] === type);
  });
  animateUpdate();
}

function changeQty(delta) {
  const t = TYPES[state.type];
  state.qty = Math.max(t.min, Math.min(t.max, state.qty + delta * 15));
  animateUpdate();
}

function setUnit(u) {
  state.unit = u;
  document.getElementById('btn-g').classList.toggle('active', u==='g');
  document.getElementById('btn-oz').classList.toggle('active', u==='oz');
  animateUpdate();
}

function animateUpdate() {
  const w = document.getElementById('steps-wrapper');
  const ic = document.getElementById('ingredients-card');
  w.classList.add('updating');
  ic.classList.add('updating');
  setTimeout(() => { render(); w.classList.remove('updating'); ic.classList.remove('updating'); }, 200);
}

render();
updateFontBtns();
renderGallery();
updateKeyStatus();
