<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>香蕉燕麥馬芬 🧁 | Landie Recipe</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --warm-white: #FDF9F4;
    --oat: #C4956A;
    --oat-light: #E8D5BE;
    --oat-dark: #9B6E47;
    --sage: #A8B5A0;
    --sage-light: #D4DDCF;
    --sage-dark: #718069;
    --brown: #5C4033;
    --text: #3D2B1F;
    --text-light: #7A6054;
    --text-muted: #A89080;
    --card-bg: #FFFFFF;
    --shadow-soft: 0 4px 20px rgba(92,64,51,0.08);
    --shadow-card: 0 2px 12px rgba(92,64,51,0.10);
    --radius: 20px;
    --radius-sm: 12px;
    --radius-xs: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--cream);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(196,149,106,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(168,181,160,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 10%, rgba(232,213,190,0.12) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
    padding: 0 16px 80px;
    position: relative;
    z-index: 1;
  }

  /* ── NAV ── */
  .recipe-nav { padding: 16px 4px 0; }
  .nav-back {
    display: inline-flex; align-items: center; gap: 5px;
    text-decoration: none; color: var(--text-muted); font-size: 12px;
    padding: 6px 14px; border-radius: 100px;
    border: 1px solid var(--oat-light); background: var(--card-bg);
    transition: all 0.2s; box-shadow: 0 1px 6px rgba(92,64,51,0.07);
  }
  .nav-back:hover { color: var(--brown); border-color: var(--oat); background: var(--oat-light); }
  .nav-back svg { width: 12px; height: 12px; flex-shrink: 0; }

  /* ── LOGO ── */
  .logo-wrapper {
    text-align: center;
    padding: 32px 20px 16px;
    animation: fadeDown 0.6s ease both;
  }

  .logo-wrapper img {
    max-height: 72px;
    max-width: 180px;
    object-fit: contain;
  }

  /* ── UTILITY BAR ── */
  .util-bar {
    display: flex; align-items: center; justify-content: flex-end;
    gap: 8px; padding: 0 4px 10px;
    animation: fadeDown 0.5s ease both 0.1s;
  }
  .lang-btn {
    display: flex; align-items: center; gap: 6px; padding: 7px 14px;
    background: var(--card-bg); border: 1px solid var(--oat-light); border-radius: 100px;
    font-family: 'Noto Sans TC', sans-serif; font-size: 12px; color: var(--text-light);
    cursor: pointer; transition: all 0.2s; box-shadow: 0 1px 6px rgba(92,64,51,0.07); white-space: nowrap;
  }
  .lang-btn:hover { color: var(--brown); border-color: var(--oat); background: var(--oat-light); }
  .lang-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
  .lang-opt { opacity: 0.45; transition: all 0.2s; }
  .lang-opt.active { opacity: 1; color: var(--brown); font-weight: 600; }
  .font-ctrl {
    display: flex; align-items: center;
    background: var(--card-bg); border: 1px solid var(--oat-light); border-radius: 100px;
    overflow: hidden; box-shadow: 0 1px 6px rgba(92,64,51,0.07);
  }
  .font-btn {
    display: flex; align-items: baseline; justify-content: center;
    padding: 7px 11px; border: none; background: transparent;
    color: var(--text-muted); font-family: 'Noto Sans TC', sans-serif;
    font-weight: 500; cursor: pointer; transition: all 0.2s; line-height: 1;
  }
  .font-btn:hover { background: var(--oat-light); color: var(--brown); }
  .font-btn + .font-btn { border-left: 1px solid var(--oat-light); }
  .font-btn.at-limit { opacity: 0.28; pointer-events: none; }
  .font-btn .fa { font-size: 14px; }
  .font-btn .fs { font-size: 9px; font-weight: 700; color: var(--oat); vertical-align: super; margin-left: 1px; }

  /* ── HERO ── */
  .hero {
    background: linear-gradient(135deg, #FFF8F0 0%, #F5F8F3 100%);
    border-radius: var(--radius);
    box-shadow: var(--shadow-soft);
    border: 1px solid var(--oat-light);
    text-align: center;
    padding: 36px 28px 30px;
    margin-bottom: 28px;
    animation: fadeDown 0.7s ease both;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -50px; right: -50px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(196,149,106,0.13) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero::after {
    content: '';
    position: absolute;
    bottom: -50px; left: -50px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(168,181,160,0.13) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-emoji-wrap {
    width: 76px;
    height: 76px;
    background: linear-gradient(135deg, var(--oat-light), var(--sage-light));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-size: 36px;
    box-shadow: 0 4px 16px rgba(196,149,106,0.28);
    animation: bounceIn 0.8s ease both 0.2s;
    position: relative;
    z-index: 1;
  }

  .hero h1 {
    font-family: 'Playfair Display', 'Noto Serif TC', serif;
    font-size: clamp(26px, 5.5vw, 40px);
    font-weight: 700;
    color: var(--brown);
    line-height: 1.2;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }

  .hero-sub {
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    font-style: italic;
    position: relative;
    z-index: 1;
  }

  .hero-divider {
    width: 48px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--oat), transparent);
    border-radius: 2px;
    margin: 20px auto 18px;
    position: relative;
    z-index: 1;
  }

  .hero-chips {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    position: relative;
    z-index: 1;
  }

  .hero-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 14px;
    background: rgba(255,255,255,0.75);
    border-radius: 100px;
    font-size: 12px;
    color: var(--text-light);
    font-weight: 400;
    border: 1px solid var(--oat-light);
    backdrop-filter: blur(4px);
  }

  .hero-chip strong {
    color: var(--oat-dark);
    font-weight: 600;
  }

  /* ── CONTROL PANEL ── */
  .control-panel {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow-soft);
    margin-bottom: 28px;
    animation: fadeUp 0.6s ease both 0.2s;
  }

  .control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .control-group {
    flex: 1;
    min-width: 200px;
  }

  .control-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    display: block;
  }

  /* Serving type tabs */
  .type-tabs {
    display: flex;
    background: var(--cream);
    border-radius: var(--radius-sm);
    padding: 4px;
    gap: 2px;
  }

  .type-tab {
    flex: 1;
    padding: 8px 6px;
    border: none;
    background: transparent;
    border-radius: var(--radius-xs);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    font-weight: 400;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: center;
    line-height: 1.3;
  }

  .type-tab.active {
    background: var(--card-bg);
    color: var(--oat-dark);
    font-weight: 500;
    box-shadow: 0 2px 8px rgba(92,64,51,0.12);
  }

  .type-tab:hover:not(.active) {
    color: var(--text);
    background: rgba(255,255,255,0.6);
  }

  /* Quantity stepper */
  .stepper {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--cream);
    border-radius: var(--radius-sm);
    overflow: hidden;
    width: fit-content;
  }

  .stepper-btn {
    width: 44px;
    height: 44px;
    border: none;
    background: transparent;
    color: var(--oat-dark);
    font-size: 22px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 300;
  }

  .stepper-btn:hover { background: var(--oat-light); }
  .stepper-btn:active { transform: scale(0.92); }

  .stepper-val {
    min-width: 56px;
    text-align: center;
    font-family: 'Noto Serif TC', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--brown);
  }

  .stepper-unit {
    font-size: 11px;
    color: var(--text-muted);
    padding-right: 12px;
    font-weight: 400;
  }

  /* Divider */
  .control-divider {
    width: 1px;
    height: 50px;
    background: var(--oat-light);
    flex-shrink: 0;
  }

  /* Unit toggle */
  .unit-toggle {
    display: flex;
    background: var(--cream);
    border-radius: var(--radius-sm);
    padding: 4px;
    gap: 4px;
  }

  .unit-btn {
    padding: 10px 20px;
    border: none;
    background: transparent;
    border-radius: var(--radius-xs);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .unit-btn.active {
    background: var(--oat);
    color: white;
    box-shadow: 0 2px 10px rgba(196,149,106,0.35);
  }

  .unit-btn:hover:not(.active) { color: var(--text); }

  /* Summary badge */
  .serving-summary {
    margin-top: 16px;
    padding: 12px 16px;
    background: linear-gradient(135deg, var(--oat-light), var(--sage-light));
    border-radius: var(--radius-xs);
    font-size: 13px;
    color: var(--brown);
    text-align: center;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  /* ── INGREDIENTS LIST ── */
  .ingredients-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 24px 8px 8px;
    box-shadow: var(--shadow-soft);
    margin-bottom: 28px;
    animation: fadeUp 0.6s ease both 0.3s;
  }

  .ing-group {
    margin-bottom: 8px;
  }

  .ing-group:last-child {
    margin-bottom: 0;
  }

  .ing-group-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 0 16px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ing-group-label em {
    font-style: italic;
    text-transform: none;
    letter-spacing: 0.04em;
    font-weight: 400;
  }

  .ing-group-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--oat-light), transparent);
  }

  /* ── ING CARD HAVE STATE ── */
  .ing-card.selectable { cursor: pointer; user-select: none; }
  .ing-card-check {
    position: absolute; top: 7px; right: 7px;
    width: 20px; height: 20px; border-radius: 50%;
    border: 1.5px solid var(--oat-light); background: white;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; transition: all 0.2s ease; color: transparent;
  }
  .ing-card.have { opacity: 0.45; }
  .ing-card.have .ing-card-check { background: var(--sage); border-color: var(--sage-dark); color: white; }
  .ing-card.have .ing-name { text-decoration: line-through; text-decoration-color: var(--text-muted); }

  /* ── SELECT MODE BANNER ── */
  .select-banner {
    margin: 0 8px 14px; padding: 14px 16px;
    background: linear-gradient(135deg, var(--sage-light) 0%, var(--oat-light) 100%);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; gap: 12px;
  }
  .select-banner-icon { font-size: 22px; flex-shrink: 0; }
  .select-banner-body { flex: 1; }
  .select-banner-title { font-family: 'Noto Serif TC', serif; font-size: 14px; font-weight: 600; color: var(--brown); margin-bottom: 3px; }
  .select-banner-hint { font-size: 11px; color: var(--text-muted); line-height: 1.5; }
  .select-banner-hint strong { color: var(--oat-dark); }
  .select-banner-cancel {
    border: none; background: rgba(255,255,255,0.65); color: var(--text-muted);
    font-family: 'Noto Sans TC', sans-serif; font-size: 12px;
    padding: 6px 12px; border-radius: 100px; cursor: pointer;
    transition: all 0.2s; flex-shrink: 0;
  }
  .select-banner-cancel:hover { background: white; color: var(--brown); }

  .shop-generate-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: calc(100% - 32px); margin: 10px 16px 16px; padding: 14px 20px;
    background: linear-gradient(135deg, var(--oat), var(--oat-dark));
    color: white; border: none; border-radius: var(--radius-sm);
    font-family: 'Noto Sans TC', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.25s ease;
    box-shadow: 0 4px 16px rgba(196,149,106,0.35);
  }
  .shop-generate-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(196,149,106,0.45); }
  .shop-generate-btn:active { transform: none; }
  .shop-generate-btn svg { width: 16px; height: 16px; }

  /* ── ENTRY CTA ── */
  .shop-entry-btn {
    display: flex; align-items: center; gap: 14px;
    width: calc(100% - 32px); margin: 8px 16px 16px; padding: 14px 18px;
    border: 1.5px dashed var(--oat-light); border-radius: var(--radius-sm);
    background: transparent; cursor: pointer; transition: all 0.25s ease; text-align: left;
  }
  .shop-entry-btn:hover { border-style: solid; border-color: var(--oat); background: linear-gradient(135deg, rgba(196,149,106,0.05), rgba(168,181,160,0.05)); }
  .shop-entry-icon { width: 42px; height: 42px; background: linear-gradient(135deg, var(--oat-light), var(--sage-light)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .shop-entry-text { flex: 1; }
  .shop-entry-text strong { display: block; font-size: 13px; color: var(--brown); font-weight: 600; margin-bottom: 3px; }
  .shop-entry-text span { font-size: 11px; color: var(--text-muted); line-height: 1.4; display: block; }
  .shop-entry-arrow { color: var(--oat); flex-shrink: 0; }
  .shop-entry-arrow svg { width: 16px; height: 16px; display: block; }

  /* ── SHOPPING OVERLAY ── */
  .shop-overlay {
    position: fixed; inset: 0; z-index: 200;
    display: flex; flex-direction: column; justify-content: flex-end;
    background: rgba(61,43,31,0); pointer-events: none;
    transition: background 0.3s ease;
  }
  .shop-overlay.active { background: rgba(61,43,31,0.45); pointer-events: all; }

  .shop-sheet {
    background: var(--warm-white); border-radius: 24px 24px 0 0;
    max-height: 88vh; display: flex; flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.38s cubic-bezier(0.34, 1.2, 0.64, 1);
    box-shadow: 0 -8px 40px rgba(92,64,51,0.18);
  }
  .shop-overlay.active .shop-sheet { transform: translateY(0); }

  .shop-handle { width: 36px; height: 4px; background: var(--oat-light); border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; }

  .shop-sheet-header { display: flex; align-items: center; gap: 10px; padding: 16px 20px 14px; border-bottom: 1px solid var(--oat-light); flex-shrink: 0; }
  .shop-back-btn {
    display: flex; align-items: center; gap: 4px;
    border: 1px solid var(--oat-light); border-radius: 100px;
    background: var(--cream); color: var(--text-muted);
    font-family: 'Noto Sans TC', sans-serif; font-size: 12px;
    padding: 5px 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .shop-back-btn:hover { color: var(--brown); border-color: var(--oat); background: var(--oat-light); }
  .shop-back-btn svg { width: 12px; height: 12px; }
  .shop-sheet-title { flex: 1; text-align: center; font-family: 'Noto Serif TC', serif; font-size: 15px; font-weight: 600; color: var(--brown); }
  .shop-close-btn { width: 30px; height: 30px; border-radius: 50%; border: none; background: var(--cream); color: var(--text-muted); font-size: 18px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .shop-close-btn:hover { background: var(--oat-light); color: var(--brown); }

  .shop-sheet-sub { padding: 9px 20px; font-size: 12px; color: var(--text-muted); background: var(--cream); border-bottom: 1px solid var(--oat-light); text-align: center; flex-shrink: 0; }
  .shop-sheet-body { flex: 1; overflow-y: auto; padding: 4px 12px; -webkit-overflow-scrolling: touch; }

  .shopping-group-label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); padding: 12px 8px 4px; }
  .shopping-item { display: flex; align-items: center; gap: 10px; padding: 10px 8px; border-radius: var(--radius-xs); cursor: pointer; transition: background 0.15s; }
  .shopping-item:hover { background: var(--cream); }
  .shopping-item input[type="checkbox"] { display: none; }
  .shopping-check { width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid var(--oat); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; background: white; color: white; }
  .shopping-item.checked .shopping-check { background: var(--sage); border-color: var(--sage-dark); }
  .shopping-item.checked .shopping-name,
  .shopping-item.checked .shopping-amount { text-decoration: line-through; opacity: 0.45; }
  .shopping-emoji { font-size: 18px; flex-shrink: 0; }
  .shopping-name { flex: 1; font-size: 14px; color: var(--text); }
  .shopping-amount { font-size: 12px; color: var(--oat-dark); font-weight: 500; font-family: 'Noto Serif TC', serif; white-space: nowrap; }
  .shopping-amount span { color: var(--text-muted); font-weight: 300; }

  .shop-all-have { text-align: center; padding: 36px 20px; color: var(--text-muted); font-size: 14px; }
  .shop-all-have .all-icon { font-size: 36px; display: block; margin-bottom: 10px; }

  .shop-sheet-footer { display: flex; gap: 8px; padding: 14px 16px; border-top: 1px solid var(--oat-light); background: var(--warm-white); flex-shrink: 0; }
  .action-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 11px 8px; border: 1.5px solid var(--oat-light); border-radius: var(--radius-xs); background: var(--cream); color: var(--text-light); font-family: 'Noto Sans TC', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .action-btn:hover { background: var(--oat-light); color: var(--brown); border-color: var(--oat); }
  .action-btn.copied { background: var(--sage-light); color: var(--sage-dark); border-color: var(--sage); }
  .action-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

  /* ── TOAST ── */
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--brown); color: white; padding: 10px 22px; border-radius: 100px; font-size: 13px; opacity: 0; pointer-events: none; transition: all 0.3s ease; z-index: 999; box-shadow: 0 4px 16px rgba(92,64,51,0.25); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── PRINT BUTTON ── */
  .print-btn {
    display: flex; align-items: center; gap: 5px; padding: 7px 14px;
    background: var(--card-bg); border: 1px solid var(--oat-light); border-radius: 100px;
    font-family: 'Noto Sans TC', sans-serif; font-size: 12px; color: var(--text-light);
    cursor: pointer; transition: all 0.2s; box-shadow: 0 1px 6px rgba(92,64,51,0.07);
    white-space: nowrap;
  }
  .print-btn:hover { color: var(--brown); border-color: var(--oat); background: var(--oat-light); }
  .print-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

  /* ── GLOSSARY ── */
  .gloss { border-bottom: 1.5px dotted var(--oat-dark); cursor: help; display: inline; }
  #gloss-tooltip {
    position: fixed; z-index: 600;
    background: var(--card-bg); border: 1px solid var(--oat-light);
    border-radius: var(--radius-sm); box-shadow: 0 8px 32px rgba(92,64,51,0.18);
    padding: 14px 16px; max-width: 280px; pointer-events: none;
    animation: fadeUp 0.18s ease;
  }
  .gloss-term-zh { font-size: 13px; font-weight: 600; color: var(--brown); margin-bottom: 1px; }
  .gloss-term-en { font-size: 11px; color: var(--text-muted); margin-bottom: 7px; font-style: italic; }
  .gloss-def-zh { font-size: 12px; color: var(--text); line-height: 1.65; margin-bottom: 5px; }
  .gloss-def-en { font-size: 11px; color: var(--text-light); line-height: 1.6; }

  /* ── SUBSTITUTION HELPER ── */
  .sub-btn {
    position: absolute; top: 6px; right: 6px;
    width: 22px; height: 22px; border-radius: 50%;
    border: 1px solid var(--oat-light); background: var(--card-bg);
    color: var(--oat-dark); font-size: 11px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s; z-index: 2; flex-shrink: 0;
  }
  .sub-btn:hover { background: var(--oat-light); border-color: var(--oat); }
  .subs-popover {
    position: fixed; z-index: 700; min-width: 280px; max-width: 320px;
    background: var(--card-bg); border: 1px solid var(--oat-light);
    border-radius: var(--radius-sm); box-shadow: 0 8px 32px rgba(92,64,51,0.18);
    padding: 0; overflow: hidden; animation: fadeUp 0.2s ease;
  }
  .subs-popover-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px 10px; border-bottom: 1px solid var(--oat-light);
    background: linear-gradient(135deg, #FFF8F0, #F5F8F3);
  }
  .subs-popover-title { font-size: 12px; font-weight: 600; color: var(--brown); }
  .subs-close-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; padding: 2px 6px; }
  .sub-item { padding: 10px 14px; border-bottom: 1px solid var(--oat-light); }
  .sub-item:last-child { border-bottom: none; }
  .sub-name { font-size: 12px; font-weight: 600; color: var(--brown); display: flex; align-items: center; gap: 6px; }
  .sub-ratio { font-size: 10px; font-weight: 500; background: var(--oat-light); color: var(--oat-dark); padding: 1px 6px; border-radius: 100px; }
  .sub-note { font-size: 11px; color: var(--text-light); margin-top: 2px; line-height: 1.5; }

  /* ── STEP DIFFICULTY BADGE ── */
  .step-diff-pill {
    flex-shrink: 0; padding: 3px 9px; border-radius: 100px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
    cursor: default; white-space: nowrap; position: relative; align-self: flex-start; margin-top: 2px;
  }
  .step-diff-pill.easy      { background: #e8f8f0; color: #2d8a5e; }
  .step-diff-pill.watch-out { background: #fef3de; color: #b07a1a; }
  .step-diff-pill.tricky    { background: #fdecea; color: #b94534; }
  .step-diff-pill::after {
    content: attr(data-tip);
    position: absolute; bottom: calc(100% + 6px); right: 0;
    background: var(--brown); color: #fff;
    font-size: 11px; font-weight: 400; padding: 6px 10px;
    border-radius: 8px; white-space: normal; width: 180px;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
    line-height: 1.5; z-index: 10;
  }
  .step-diff-pill:hover::after { opacity: 1; }

  /* ── I MADE THIS ── */
  .made-section { text-align: center; margin: 28px 0; }
  .made-btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 16px 32px; border-radius: 100px;
    background: linear-gradient(135deg, var(--oat), var(--oat-dark));
    border: none; color: #fff; font-family: 'Noto Sans TC', sans-serif;
    font-size: 16px; font-weight: 600; cursor: pointer;
    box-shadow: 0 4px 20px rgba(196,149,106,0.4);
    transition: all 0.25s ease; letter-spacing: 0.03em;
  }
  .made-btn:hover { transform: scale(1.04); box-shadow: 0 6px 28px rgba(196,149,106,0.5); }
  .made-btn.made-done {
    background: linear-gradient(135deg, #4caf82, #2d8a5e);
    box-shadow: 0 4px 20px rgba(76,175,130,0.4);
  }
  .made-date { font-size: 12px; color: var(--text-muted); margin-top: 8px; }

  /* ── CONFETTI ── */
  .confetti-piece {
    position: fixed; top: -12px; z-index: 9999; pointer-events: none;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(0)     rotate(0deg);   opacity: 1; }
    100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
  }

  /* ── PRINT ── */
  @media print {
    body:not(.printing-shopping) .recipe-nav,
    body:not(.printing-shopping) .util-bar,
    body:not(.printing-shopping) .control-panel,
    body:not(.printing-shopping) .shop-entry-btn,
    body:not(.printing-shopping) .shop-generate-btn,
    body:not(.printing-shopping) .select-banner,
    body:not(.printing-shopping) #section-gallery,
    body:not(.printing-shopping) .gallery-upload,
    body:not(.printing-shopping) .gallery-apikey-row,
    body:not(.printing-shopping) .gallery-key-bar,
    body:not(.printing-shopping) .gallery-entries,
    body:not(.printing-shopping) .made-section,
    body:not(.printing-shopping) .notes-card,
    body:not(.printing-shopping) .toast,
    body:not(.printing-shopping) .timer-fullscreen,
    body:not(.printing-shopping) .shop-overlay { display: none !important; }
    body:not(.printing-shopping) .container { padding: 16px !important; }
    body:not(.printing-shopping) .hero { box-shadow: none !important; border: 1px solid #ddd !important; }
    body:not(.printing-shopping) .step-card { box-shadow: none !important; break-inside: avoid; border: 1px solid #eee !important; }
    body:not(.printing-shopping) .ingredients-card { box-shadow: none !important; }
    body:not(.printing-shopping) .sub-btn { display: none !important; }
    body:not(.printing-shopping) .step-diff-pill::after { display: none !important; }
    body.printing-shopping * { visibility: hidden; }
    body.printing-shopping .print-area,
    body.printing-shopping .print-area * { visibility: visible; }
    body.printing-shopping .print-area { position: fixed; left: 0; top: 0; right: 0; padding: 32px; }
    body.printing-shopping .shop-sheet-footer,
    body.printing-shopping .shop-back-btn,
    body.printing-shopping .shop-close-btn { display: none !important; }
  }

  /* ── SECTIONS ── */
  .section-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--oat-dark);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--oat-light), transparent);
  }

  /* ── STEPS ── */
  .steps-wrapper {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .step-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-card);
    animation: fadeUp 0.5s ease both;
    transition: box-shadow 0.3s ease;
  }

  .step-card:hover {
    box-shadow: 0 8px 32px rgba(92,64,51,0.13);
  }

  .step-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 20px 22px 16px;
  }

  .step-num {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--oat), var(--oat-dark));
    color: white;
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(196,149,106,0.4);
  }

  .step-title-text {
    font-family: 'Noto Serif TC', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--brown);
  }

  .step-instruction {
    padding: 0 22px 18px;
    font-size: 14px;
    line-height: 1.75;
    color: var(--text-light);
    font-weight: 300;
  }

  .step-instruction strong {
    color: var(--brown);
    font-weight: 500;
  }

  /* Bake times */
  .bake-times {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 0 22px 20px;
  }

  .bake-badge {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 12px 14px;
    background: var(--cream);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text);
    flex: 1;
    min-width: 110px;
  }

  .bake-badge-info { display: flex; align-items: center; gap: 8px; }
  .bake-badge .bake-icon { font-size: 18px; flex-shrink: 0; }
  .bake-badge .bake-label { color: var(--text-muted); font-size: 12px; }
  .bake-badge .bake-time { font-weight: 600; color: var(--oat-dark); font-family: 'Noto Serif TC', serif; }

  /* ── TIMER ── */
  .timer-start-btn {
    width: 100%; padding: 7px 10px;
    border: 1.5px solid var(--oat-light); border-radius: var(--radius-xs);
    background: transparent; color: var(--oat-dark);
    font-family: 'Noto Sans TC', sans-serif; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; text-align: center; line-height: 1.4;
  }
  .timer-start-btn:hover { background: var(--oat-light); border-color: var(--oat); }

  .timer-running {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(196,149,106,0.12); border-radius: var(--radius-xs); padding: 6px 10px;
  }
  .timer-digits {
    font-family: 'Noto Serif TC', serif; font-size: 20px; font-weight: 600;
    color: var(--brown); letter-spacing: 0.05em; font-variant-numeric: tabular-nums;
  }
  .timer-cancel-btn {
    width: 26px; height: 26px; border: none; background: transparent;
    color: var(--text-muted); font-size: 13px; cursor: pointer; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0;
  }
  .timer-cancel-btn:hover { background: rgba(0,0,0,0.08); color: var(--brown); }

  .timer-done {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 8px 10px; text-align: center;
    background: linear-gradient(135deg, rgba(168,181,160,0.25), rgba(196,149,106,0.15));
    border-radius: var(--radius-xs); animation: timerDoneFlash 0.5s ease 5;
  }
  .timer-done-icon { font-size: 20px; }
  .timer-done-text { font-size: 12px; font-weight: 600; color: var(--brown); }
  .timer-close-btn {
    padding: 4px 14px; border: none; border-radius: 100px;
    background: var(--sage); color: white; font-family: 'Noto Sans TC', sans-serif;
    font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.2s;
  }
  .timer-close-btn:hover { background: var(--sage-dark); }

  @keyframes timerDoneFlash {
    0%, 100% { opacity: 1; } 50% { opacity: 0.45; }
  }

  /* ── GALLERY ── */
  .gallery-upload {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; padding: 28px 20px; border: 2px dashed var(--oat-light);
    border-radius: var(--radius); background: var(--card-bg); cursor: pointer;
    transition: all 0.25s; text-align: center; margin-bottom: 0;
  }
  .gallery-upload:hover { border-color: var(--oat); background: rgba(196,149,106,0.04); }
  .gallery-upload.drag-over { border-color: var(--oat); background: var(--oat-light); }
  .gallery-upload-icon { font-size: 30px; }
  .gallery-upload-title { font-size: 14px; font-weight: 500; color: var(--brown); }
  .gallery-upload-sub { font-size: 11px; color: var(--text-muted); }

  .gallery-apikey-row {
    margin-top: 10px; padding: 12px 14px;
    background: var(--cream); border-radius: var(--radius-sm);
    border: 1px solid var(--oat-light); display: none; flex-direction: column; gap: 6px;
  }
  .gallery-apikey-row.visible { display: flex; }
  .gallery-apikey-inner { display: flex; gap: 8px; align-items: center; }
  .gallery-apikey-input {
    flex: 1; border: 1px solid var(--oat-light); background: white;
    border-radius: var(--radius-xs); padding: 7px 10px;
    font-family: 'Noto Sans TC', sans-serif; font-size: 12px; color: var(--text); outline: none;
  }
  .gallery-apikey-input:focus { border-color: var(--oat); }
  .gallery-apikey-btn {
    padding: 7px 16px; border: 1px solid var(--oat); border-radius: 100px;
    background: transparent; color: var(--oat-dark); font-size: 12px;
    cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans TC', sans-serif; white-space: nowrap;
  }
  .gallery-apikey-btn:hover { background: var(--oat-light); }
  .gallery-apikey-hint { font-size: 11px; color: var(--text-muted); }
  .gallery-apikey-hint a { color: var(--oat-dark); }

  .gallery-key-bar { margin-top: 8px; text-align: right; }
  .gallery-key-btn {
    background: none; border: none; padding: 4px 6px;
    font-family: 'Noto Sans TC', sans-serif; font-size: 11px;
    color: var(--text-muted); cursor: pointer; transition: color 0.2s;
    border-radius: var(--radius-xs);
  }
  .gallery-key-btn:hover { color: var(--oat-dark); }
  .gallery-key-btn.has-key { color: var(--sage-dark); }

  .gallery-entries { display: flex; flex-direction: column; gap: 14px; margin-top: 16px; }

  .gallery-entry {
    background: var(--card-bg); border-radius: var(--radius);
    overflow: hidden; box-shadow: var(--shadow-card); animation: fadeUp 0.4s ease both;
  }
  .gallery-entry-top { display: flex; }
  .gallery-photo { width: 120px; height: 120px; object-fit: cover; flex-shrink: 0; }
  .gallery-entry-body { flex: 1; padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; min-width: 0; }
  .gallery-entry-meta { display: flex; align-items: center; justify-content: space-between; }
  .gallery-entry-date { font-size: 11px; color: var(--text-muted); }
  .gallery-entry-delete {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 13px; padding: 3px 5px;
    border-radius: 4px; transition: all 0.2s; line-height: 1; flex-shrink: 0;
  }
  .gallery-entry-delete:hover { background: rgba(200,0,0,0.08); color: #c0392b; }
  .gallery-ai-msg {
    font-size: 13px; color: var(--text-light); line-height: 1.65;
    border-left: 3px solid var(--oat-light); padding-left: 10px;
  }
  .gallery-ai-loading { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
  .gallery-notes-input {
    width: 100%; border: 1px solid var(--oat-light); border-radius: var(--radius-xs);
    padding: 7px 10px; font-family: 'Noto Sans TC', sans-serif; font-size: 12px;
    color: var(--text); background: var(--cream); resize: vertical; min-height: 46px;
    outline: none; transition: border-color 0.2s;
  }
  .gallery-notes-input:focus { border-color: var(--oat); }
  .gallery-notes-input::placeholder { color: var(--text-muted); }

  @keyframes loadingDot {
    0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; }
  }
  .loading-dot { display: inline-block; animation: loadingDot 1.4s ease infinite; }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }

  /* Ingredient cards row */
  .ing-cards {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 0 16px 20px;
  }

  .ing-card {
    background: var(--cream);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    min-width: 100px;
    flex: 1;
    text-align: center;
    border: 1.5px solid transparent;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .ing-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(196,149,106,0.05), rgba(168,181,160,0.05));
    opacity: 0;
    transition: opacity 0.25s;
  }

  .ing-card:hover {
    border-color: var(--oat-light);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(196,149,106,0.15);
  }

  .ing-card:hover::before { opacity: 1; }

  .ing-emoji { font-size: 24px; display: block; margin-bottom: 6px; }
  .ing-name {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 6px;
    letter-spacing: 0.03em;
    line-height: 1.3;
  }

  .ing-cup {
    font-size: 13px;
    font-weight: 600;
    color: var(--brown);
    font-family: 'Noto Serif TC', serif;
    margin-bottom: 3px;
  }

  .ing-weight {
    font-size: 12px;
    color: var(--oat-dark);
    font-weight: 500;
  }

  /* ── NOTES ── */
  .notes-card {
    background: linear-gradient(135deg, #FFF8F0, #F5F8F3);
    border-radius: var(--radius);
    padding: 24px;
    margin-top: 28px;
    border: 1px solid var(--oat-light);
    animation: fadeUp 0.6s ease both 0.4s;
  }

  .note-item {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid rgba(196,149,106,0.12);
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--text-light);
  }

  .note-item:last-child { border-bottom: none; padding-bottom: 0; }
  .note-item:first-child { padding-top: 0; }
  .note-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes bounceIn {
    0% { transform: scale(0.5); opacity: 0; }
    70% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes shimmer {
    0% { opacity: 1; }
    50% { opacity: 0.6; }
    100% { opacity: 1; }
  }

  .updating { animation: shimmer 0.4s ease; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .control-row { flex-direction: column; align-items: stretch; gap: 20px; }
    .control-divider { display: none; }
    .control-group { min-width: unset; }
    .type-tab { font-size: 11px; padding: 8px 4px; }
    .ing-card { min-width: 80px; }
    .stepper { width: 100%; justify-content: center; }
    .unit-toggle { justify-content: center; }
  }

  @media (min-width: 601px) and (max-width: 900px) {
    .ing-card { min-width: 110px; }
  }

  @media (min-width: 901px) {
    .container { padding: 0 24px 80px; }
    .step-header { padding: 24px 28px 18px; }
    .step-instruction { padding: 0 28px 20px; font-size: 15px; }
    .ing-cards { padding: 0 20px 24px; }
    .bake-times { padding: 0 28px 24px; }
  }

  /* ── FULLSCREEN TIMER ── */
  .timer-fullscreen {
    position: fixed; inset: 0; z-index: 600;
    background: linear-gradient(160deg, #1E1008 0%, #0F180A 50%, #1E1008 100%);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s ease;
  }
  .timer-fullscreen.active { opacity: 1; pointer-events: all; }

  .timer-fs-card {
    text-align: center; padding: 48px 32px 40px;
    max-width: 460px; width: 100%;
    position: relative;
  }

  .timer-fs-top {
    position: absolute; top: 0; right: 0; left: 0;
    display: flex; justify-content: space-between; align-items: center;
  }

  .timer-fs-minimize {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.14);
    border-radius: 100px; color: rgba(255,255,255,0.45);
    font-size: 12px; padding: 7px 16px; cursor: pointer;
    transition: all 0.2s; font-family: 'Noto Sans TC', sans-serif;
  }
  .timer-fs-minimize:hover { background: rgba(255,255,255,0.16); color: white; }

  .timer-fs-icon {
    font-size: 56px; margin-bottom: 10px; display: block;
    animation: timerFloat 3.2s ease-in-out infinite;
  }
  @keyframes timerFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .timer-fs-name {
    font-family: 'Noto Serif TC', serif; font-size: 15px;
    color: rgba(196,149,106,0.75); letter-spacing: 0.12em;
    margin-bottom: 28px;
  }

  .timer-fs-digits {
    font-family: 'Playfair Display', serif;
    font-size: clamp(80px, 22vw, 130px);
    font-weight: 700; color: #EAD8C2;
    letter-spacing: 0.04em; font-variant-numeric: tabular-nums;
    line-height: 1; margin-bottom: 28px;
    text-shadow: 0 0 60px rgba(196,149,106,0.35);
    transition: color 0.5s;
  }
  .timer-fs-digits.done { color: #A8B5A0; text-shadow: 0 0 60px rgba(168,181,160,0.4); }

  .timer-fs-progress-wrap {
    width: 180px; height: 3px; background: rgba(255,255,255,0.1);
    border-radius: 2px; margin: 0 auto 36px; overflow: hidden;
  }
  .timer-fs-bar {
    height: 100%;
    background: linear-gradient(90deg, #C4956A, #A8B5A0);
    border-radius: 2px; transition: width 1s linear;
  }

  .timer-fs-msg {
    font-family: 'Noto Serif TC', serif; font-size: 15px;
    color: rgba(255,255,255,0.55); line-height: 1.65;
    min-height: 52px; margin-bottom: 44px;
  }
  .timer-fs-msg.fading { opacity: 0; transition: opacity 0.4s; }
  .timer-fs-msg.visible { opacity: 1; transition: opacity 0.4s; }

function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function wrapGloss(html) {
  const terms = Object.keys(GLOSSARY).sort((a, b) => b.length - a.length);
  return html.split(/(<[^>]+>)/).map((part, i) => {
    if (i % 2 === 1) return part;
    for (const term of terms) {
      const rx = new RegExp(`\\b${escapeRegex(term)}\\b`, 'gi');
      part = part.replace(rx, `<span class="gloss" data-term="${term}">$&</span>`);
    }
    return part;
  }).join('');

function updateFsDisplay() {
  if (!fsTimerType) return;
  const t = TIMERS[fsTimerType];
  const isEn = lang === 'en';
  const mm = String(Math.floor(t.remaining / 60)).padStart(2, '0');
  const ss = String(t.remaining % 60).padStart(2, '0');
  document.getElementById('timer-fs-digits').textContent = `${mm}:${ss}`;

  const total = BAKE_DURATIONS[fsTimerType];
  const pct = ((total - t.remaining) / total) * 100;
  document.getElementById('timer-fs-bar').style.width = `${pct}%`;

  if (t.state === 'done') {
    document.getElementById('timer-fs-digits').classList.add('done');
    document.getElementById('timer-fs-msg').textContent = isEn ? "🔔 Time's up! Take it out!" : '🔔 時間到！可以出爐了！';

    btn.className = 'timer-fs-cancel done-btn';

  }
}

function startFsMsgRotation() {
  stopFsMsgRotation();
  fsMsgIndex = Math.floor(Math.random() * WAIT_MSGS[lang].length);
  showFsMsg();
  fsMsgInterval = setInterval(() => {
    fsMsgIndex = (fsMsgIndex + 1) % WAIT_MSGS[lang].length;
    const el = document.getElementById('timer-fs-msg');
    if (!el || !fsTimerType) return;
    el.classList.remove('visible'); el.classList.add('fading');
    setTimeout(() => { showFsMsg(); el.classList.remove('fading'); el.classList.add('visible'); }, 420);
  }, 9000);
}

function showFsMsg() {
  const el = document.getElementById('timer-fs-msg');
  if (!el) return;
  el.textContent = WAIT_MSGS[lang][fsMsgIndex];
}

function stopFsMsgRotation() {
  clearInterval(fsMsgInterval);
  fsMsgInterval = null;
}

function playAlertSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.38, 0.76].forEach(t => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.35, ctx.currentTime + t);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.28);
      osc.start(ctx.currentTime + t);
      osc.stop(ctx.currentTime + t + 0.3);
    });
  } catch(e) {}
}

function startTimer(type) {
  const t = TIMERS[type];
  if (t.state === 'running') { openTimerFullscreen(type); return; }
  t.state = 'running';
  t.intervalId = setInterval(() => tickTimer(type), 1000);
  renderTimerCtrl(type);
  openTimerFullscreen(type);
}

function tickTimer(type) {
  const t = TIMERS[type];
  t.remaining--;
  if (t.remaining <= 0) {
    t.remaining = 0;
    t.state = 'done';
    clearInterval(t.intervalId);
    t.intervalId = null;
    playAlertSound();
    const labels = { rect:{zh:'長方形模',en:'Rect Mold'}, std:{zh:'標準馬芬',en:'Standard Muffin'}, mini:{zh:'迷你馬芬',en:'Mini Muffin'} };
    showToast(`🔔 ${labels[type][lang]}${lang==='en'?" — Time's up!":'時間到！'}`);
    if (fsTimerType === type) updateFsDisplay();
  } else {
    if (fsTimerType === type) updateFsDisplay();
  }
  renderTimerCtrl(type);
}

function resetTimer(type) {
  const t = TIMERS[type];
  clearInterval(t.intervalId);
  t.intervalId = null;
  t.state = 'idle';
  t.remaining = BAKE_DURATIONS[type];
  renderTimerCtrl(type);
}

function renderTimerCtrl(type) {
  const el = document.getElementById(`timer-ctrl-${type}`);
  if (!el) return;
  const t = TIMERS[type];
  const isEn = lang === 'en';
  if (t.state === 'idle') {
    el.innerHTML = `<button class="timer-start-btn" onclick="startTimer('${type}')">⏱ ${isEn ? 'Start Timer' : '開始計時'}</button>`;
  } else if (t.state === 'running') {
    const mm = String(Math.floor(t.remaining / 60)).padStart(2, '0');
    const ss = String(t.remaining % 60).padStart(2, '0');
    el.innerHTML = `
      <div class="timer-running" onclick="openTimerFullscreen('${type}')" style="cursor:pointer;" title="${isEn?'Expand timer':'展開計時器'}">
        <span class="timer-digits">${mm}:${ss}</span>
        <button class="timer-cancel-btn" onclick="event.stopPropagation();resetTimer('${type}')" title="${isEn?'Cancel':'取消'}">✕</button>
      </div>`;
  } else {
    el.innerHTML = `
      <div class="timer-done">
        <span class="timer-done-icon">🔔</span>
        <span class="timer-done-text">${isEn?"Time's up!":'時間到！'}</span>
        <button class="timer-close-btn" onclick="resetTimer('${type}')">${isEn?'Close':'關閉'}</button>
      </div>`;
  }
}

async function processPhoto(file) {
  if (!getApiKey()) {
    document.getElementById('gallery-apikey-row').classList.add('visible');
    document.getElementById('gallery-apikey-input').focus();
    showToast(lang === 'en' ? 'Enter your Anthropic API key first' : '請先輸入 Anthropic API Key');
    return;
  }
  const base64 = await fileToBase64(file);
  const mediaType = file.type || 'image/jpeg';
  const timestamp = new Date().toLocaleString(lang === 'en' ? 'en-US' : 'zh-TW', { dateStyle:'medium', timeStyle:'short' });
  const id = Date.now();
  const entry = { id, base64, mediaType, timestamp, message: null, notes: '' };
  galleryEntries.unshift(entry);
  renderGalleryEntry(entry, true);
  try {
    entry.message = await analyzePhoto(base64, mediaType);
  } catch(e) {
    const isAuth = e.message === '401' || e.message === 'invalid_key';
    const isEn = lang === 'en';
    entry.message = isAuth
      ? (isEn ? '⚠️ Invalid API key — please update it below.' : '⚠️ API Key 無效，請點下方按鈕更新。')
      : (isEn ? '⚠️ Could not analyze photo. Check your connection or API key.' : '⚠️ 無法分析照片，請檢查網路或 API Key。');
    if (isAuth) {
      document.getElementById('gallery-apikey-row').classList.add('visible');
      document.getElementById('gallery-apikey-input').value = '';
      document.getElementById('gallery-apikey-input').focus();
    }
  }
  saveGallery();
  renderGalleryEntry(entry, false);
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function analyzePhoto(base64, mediaType) {
  const isEn = lang === 'en';
  const prompt = isEn
    ? `This is a photo of homemade banana oat muffins. In 2-3 warm, enthusiastic sentences: if they look successful, give genuine specific praise. If they look like they need improvement, give kind comfort and encouragement. Be emotionally warm. Respond in English only.`
    : `這是一張自製香蕉燕麥馬芬的照片。請用2-3句充滿情感的語氣：如果成果看起來不錯，給予真誠具體的熱情讚美；如果看起來需要改進，給予溫暖的安慰和繼續努力的鼓勵。只用繁體中文回覆。`;
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': getApiKey(),
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 256,
      messages: [{ role: 'user', content: [
        { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
        { type: 'text', text: prompt }
      ]}]
    })
  });
  if (!resp.ok) throw new Error(`${resp.status}`);
  const data = await resp.json();
  if (!data.content?.[0]?.text) throw new Error('empty_response');
  return data.content[0].text;
}

async function createShareImage(entry) {
  const SIZE = 1080;
  const canvas = document.createElement('canvas');
  canvas.width = SIZE; canvas.height = SIZE;
  const ctx = canvas.getContext('2d');

  const img = new Image();
  await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = `data:${entry.mediaType};base64,${entry.base64}`; });
  const scale = Math.max(SIZE / img.width, SIZE / img.height);
  const iw = img.width * scale, ih = img.height * scale;
  ctx.drawImage(img, (SIZE - iw) / 2, (SIZE - ih) / 2, iw, ih);

  const grad = ctx.createLinearGradient(0, SIZE * 0.45, 0, SIZE);
  grad.addColorStop(0, 'rgba(40,25,15,0)');
  grad.addColorStop(0.5, 'rgba(40,25,15,0.7)');
  grad.addColorStop(1, 'rgba(40,25,15,0.93)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, SIZE, SIZE);

  ctx.textAlign = 'left';
  ctx.fillStyle = '#E8D5BE';
  ctx.font = 'bold 54px serif';
  ctx.fillText('香蕉燕麥馬芬 🧁', 60, 700);
  ctx.font = '32px sans-serif';
  ctx.fillStyle = 'rgba(232,213,190,0.75)';
  ctx.fillText('Banana Oat Muffins', 60, 748);

  if (entry.message) {
    ctx.font = '26px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.82)';
    const words = entry.message.slice(0, 80);
    let line = '', y = 810;
    for (const ch of words) {
      if (ctx.measureText(line + ch).width > 960) { ctx.fillText(line, 60, y); line = ch; y += 38; if (y > 890) break; }
      else line += ch;
    }
    if (line && y <= 890) ctx.fillText(line, 60, y);
  }

  ctx.font = '22px monospace';
  ctx.fillStyle = 'rgba(196,149,106,0.9)';
  ctx.fillText(RECIPE_URL, 60, 1030);

  return canvas;
}

// ── QUANTITY MATH ──
function multiplier() {
  const t = TYPES[state.type];
  return state.qty / t.baseQty;
}

function fmtMeasure(key) {
  const d = BASE[key];
  if (!d) return { cup:'', weight:'' };
  const m = multiplier();
  let cupStr = scaleCup(d[0], m);
  let wStr;
  if (typeof d[1] === 'string') {
    const num = parseFloat(d[1].replace('~',''));
    const scaled = Math.round(num * m * 10) / 10;
    if (state.unit === 'g') wStr = `~${scaled}g`;
    else { const o = parseFloat(d[2].replace('~','')); wStr = `~${Math.round(o*m*10)/10}oz`; }
  } else {
    if (state.unit === 'g') wStr = `${Math.round(d[1]*m*10)/10}g`;
    else wStr = `${Math.round(d[2]*m*100)/100}oz`;
  }
  return { cup: cupStr, weight: wStr };
}

function scaleCup(cup, m) {
  if (cup.includes('large') || cup.includes('bananas')) {
    const num = parseFloat(cup);
    const scaled = Math.round(num * m * 10) / 10;
    return `${scaled} ${cup.replace(/[\d.]+\s*/, '')}`;
  }
  const fractions = {'½':0.5,'¼':0.25,'⅓':0.333,'⅔':0.667,'¾':0.75,'⅛':0.125};
  let val = 0, unit = '';
  for (let p of cup.split(' ')) {
    if (fractions[p]) val += fractions[p];
    else if (!isNaN(parseFloat(p))) val += parseFloat(p);
    else unit += (unit?'':' ') + p;
  }
  return `${niceNum(val * m)}${unit}`;
}

function niceNum(n) {
  const fracs = [[1/8,'⅛'],[1/4,'¼'],[1/3,'⅓'],[1/2,'½'],[2/3,'⅔'],[3/4,'¾']];
  const whole = Math.floor(n);
  const rem = n - whole;
  if (rem < 0.04) return whole > 0 ? `${whole}` : '0';
  for (let [v, s] of fracs) {
    if (Math.abs(rem - v) < 0.04) return whole > 0 ? `${whole}${s}` : s;
  }
  return (Math.round(n * 8) / 8).toFixed(2).replace(/\.?0+$/, '');
}

      <div class="sub-note">${s.note[lang]}</div>
    </div>`).join('');
  const card = btn.closest('.ing-card');
  const r = card.getBoundingClientRect();
  const popW = 300, margin = 8;
  let left = r.left;
  left = Math.max(margin, Math.min(left, window.innerWidth - popW - margin));
  pop.style.display = 'block';
  const popH = pop.offsetHeight;
  const spaceBelow = window.innerHeight - r.bottom - margin;
  const top = spaceBelow > popH ? r.bottom + 6 : r.top - popH - 6;
  pop.style.left = left + 'px';
  pop.style.top  = Math.max(margin, top) + 'px';
}
function hideSubsPopover() {

            <span class="ing-emoji">${ing.emoji}</span>
            <div class="ing-name">${ingName(ing.key)}</div>
            <div class="ing-cup">${m.cup}</div>
            <div class="ing-weight">${m.weight}</div>
          </div>`;
      });
      html += `</div>`;
    }

    card.innerHTML = html;
    wrapper.appendChild(card);
  });
  ['rect', 'std', 'mini'].forEach(renderTimerCtrl);
}

function setType(type) {
  state.type = type;
  state.qty = TYPES[type].baseQty;
  document.querySelectorAll('.type-tab').forEach((b,i) => {
    b.classList.toggle('active', ['rect','std','mini'][i] === type);
  });
  animateUpdate();
}

function changeQty(delta) {
  const t = TYPES[state.type];
  const step = state.type === 'rect' ? 1 : state.type === 'std' ? 4 : 12;
  state.qty = Math.max(t.min, Math.min(t.max, state.qty + delta * step));
  animateUpdate();
}

function setUnit(u) {
  state.unit = u;
  document.getElementById('btn-g').classList.toggle('active', u==='g');
  document.getElementById('btn-oz').classList.toggle('active', u==='oz');
  animateUpdate();
}

function animateUpdate() {
  const w = document.getElementById('steps-wrapper');
  const ic = document.getElementById('ingredients-card');
  w.classList.add('updating');
  ic.classList.add('updating');
  setTimeout(() => { render(); w.classList.remove('updating'); ic.classList.remove('updating'); }, 200);
}

render();
updateFontBtns();
renderGallery();
updateKeyStatus();
updateMadeBtn();

// ── GLOSSARY TOOLTIP INIT ──
(function() {
  const tip = document.getElementById('gloss-tooltip');
  function show(el) {
    const g = GLOSSARY[el.dataset.term]; if (!g) return;
    tip.innerHTML = `
      <div class="gloss-term-zh">${g.zh.term}</div>
      <div class="gloss-term-en">${g.en.term}</div>
      <div class="gloss-def-zh">${g.zh.def}</div>
      <div class="gloss-def-en">${g.en.def}</div>`;
    const r = el.getBoundingClientRect();
    const w = 280, margin = 8;
    let left = r.left + r.width / 2 - w / 2;
    left = Math.max(margin, Math.min(left, window.innerWidth - w - margin));
    tip.style.left = left + 'px';
    tip.style.top  = (r.bottom + 8) + 'px';
    tip.style.display = 'block';
  }
  function hide() { tip.style.display = 'none'; }
  document.addEventListener('mouseover', e => { const g = e.target.closest('.gloss'); if (g) show(g); });
  document.addEventListener('mouseout',  e => { if (!e.target.closest('.gloss')) hide(); });
  document.addEventListener('click', e => {
    const g = e.target.closest('.gloss');
    if (g) { show(g); return; }
    if (!e.target.closest('#subs-popover') && !e.target.closest('.sub-btn')) hideSubsPopover();
    hide();
  });
  document.addEventListener('scroll', hide, true);
})();
</script>

<!-- GLOSSARY TOOLTIP -->
<div id="gloss-tooltip" style="display:none"></div>

<!-- SUBSTITUTION POPOVER -->
<div id="subs-popover" class="subs-popover" style="display:none">
  <div class="subs-popover-head">
    <span id="subs-popover-title" class="subs-popover-title"></span>
    <button class="subs-close-btn" onclick="hideSubsPopover()">✕</button>
  </div>
  <div id="subs-popover-body"></div>
</div>

  <div class="timer-fs-card" onclick="event.stopPropagation()">
    <div class="timer-fs-top">
      <div style="width:80px"></div>
      <div></div>
      <button class="timer-fs-minimize" onclick="minimizeTimer()" id="timer-fs-min-btn">↙ 收起</button>
    </div>
    <span class="timer-fs-icon" id="timer-fs-icon">🧁</span>
    <div class="timer-fs-name" id="timer-fs-name">烘烤計時</div>
