<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landie Recipe</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --warm-white: #FDF9F4;
    --oat: #C4956A;
    --oat-light: #E8D5BE;
    --oat-dark: #9B6E47;
    --sage: #A8B5A0;
    --sage-light: #D4DDCF;
    --sage-dark: #718069;
    --brown: #5C4033;
    --text: #3D2B1F;
    --text-light: #7A6054;
    --text-muted: #A89080;
    --card-bg: #FFFFFF;
    --shadow-soft: 0 4px 20px rgba(92,64,51,0.08);
    --shadow-card: 0 2px 12px rgba(92,64,51,0.10);
    --radius: 20px;
    --radius-sm: 12px;
    --radius-xs: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--cream);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(196,149,106,0.09) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 80%, rgba(168,181,160,0.09) 0%, transparent 55%),
      radial-gradient(ellipse at 60% 10%, rgba(232,213,190,0.13) 0%, transparent 45%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 20px 80px;
    position: relative;
    z-index: 1;
  }

  /* ── HEADER ── */
  .site-header {
    text-align: center;
    padding: 52px 20px 36px;
    animation: fadeDown 0.7s ease both;
  }

  .logo-wrap { margin-bottom: 20px; }

  .logo-wrap img {
    max-height: 80px;
    max-width: 200px;
    object-fit: contain;
  }

  .site-tagline {
    font-family: 'Noto Serif TC', serif;
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* ── LANG TOGGLE ── */
  .util-bar {
    display: flex; align-items: center; justify-content: flex-end;
    gap: 8px; padding: 0 0 28px;
    animation: fadeDown 0.5s ease both 0.1s;
  }
  .lang-btn {
    display: flex; align-items: center; gap: 6px; padding: 7px 14px;
    background: var(--card-bg); border: 1px solid var(--oat-light); border-radius: 100px;
    font-family: 'Noto Sans TC', sans-serif; font-size: 12px; color: var(--text-light);
    cursor: pointer; transition: all 0.2s; box-shadow: 0 1px 6px rgba(92,64,51,0.07); white-space: nowrap;
  }
  .lang-btn:hover { color: var(--brown); border-color: var(--oat); background: var(--oat-light); }
  .lang-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
  .lang-opt { opacity: 0.45; transition: all 0.2s; }
  .lang-opt.active { opacity: 1; color: var(--brown); font-weight: 600; }
  .font-ctrl {
    display: flex; align-items: center;
    background: var(--card-bg); border: 1px solid var(--oat-light); border-radius: 100px;
    overflow: hidden; box-shadow: 0 1px 6px rgba(92,64,51,0.07);
  }
  .font-btn {
    display: flex; align-items: baseline; justify-content: center;
    padding: 7px 11px; border: none; background: transparent;
    color: var(--text-muted); font-family: 'Noto Sans TC', sans-serif;
    font-weight: 500; cursor: pointer; transition: all 0.2s; line-height: 1;
  }
  .font-btn:hover { background: var(--oat-light); color: var(--brown); }
  .font-btn + .font-btn { border-left: 1px solid var(--oat-light); }
  .font-btn.at-limit { opacity: 0.28; pointer-events: none; }
  .font-btn .fa { font-size: 14px; }
  .font-btn .fs { font-size: 9px; font-weight: 700; color: var(--oat); vertical-align: super; margin-left: 1px; }

  /* ── SECTION LABEL ── */
  .section-label {
    font-family: 'Noto Serif TC', serif;
    font-size: 12px; font-weight: 600; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--oat-dark);
    margin-bottom: 18px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-label::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--oat-light), transparent);
  }

  /* ── RECIPE CARDS ── */
  .recipe-grid {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .recipe-card {
    display: block;
    text-decoration: none;
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow-soft);
    border: 1.5px solid transparent;
    overflow: hidden;
    transition: all 0.28s ease;
    animation: fadeUp 0.6s ease both;
    position: relative;
  }

  .recipe-card:nth-child(2) { animation-delay: 0.12s; }

  .recipe-card:hover {
    border-color: var(--oat-light);
    box-shadow: 0 10px 40px rgba(92,64,51,0.14);
    transform: translateY(-3px);
  }

  .recipe-card-inner {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 24px 22px;
  }

  .recipe-emoji-wrap {
    width: 72px; height: 72px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--oat-light), var(--sage-light));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 34px;
    box-shadow: 0 4px 14px rgba(196,149,106,0.25);
    transition: transform 0.28s ease;
  }

  .recipe-card:hover .recipe-emoji-wrap {
    transform: scale(1.07) rotate(-3deg);
  }

  .recipe-card-body { flex: 1; min-width: 0; }

  .recipe-card-name {
    font-family: 'Playfair Display', 'Noto Serif TC', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--brown);
    line-height: 1.2;
    margin-bottom: 4px;
  }

  .recipe-card-sub {
    font-family: 'Noto Serif TC', serif;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    font-style: italic;
    margin-bottom: 12px;
  }

  .recipe-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .recipe-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px;
    background: var(--cream);
    border-radius: 100px;
    font-size: 11px;
    color: var(--text-light);
    border: 1px solid var(--oat-light);
  }

  .recipe-chip strong { color: var(--oat-dark); font-weight: 600; }

  .recipe-card-arrow {
    color: var(--oat-light);
    flex-shrink: 0;
    transition: all 0.25s ease;
  }

  .recipe-card:hover .recipe-card-arrow {
    color: var(--oat);
    transform: translateX(4px);
  }

  .recipe-card-arrow svg { width: 20px; height: 20px; display: block; }

  .recipe-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--oat-light), var(--sage-light));
    opacity: 0;
    transition: opacity 0.28s;
  }
  .recipe-card:hover::before { opacity: 1; }

  /* ── FOOTER ── */
  .home-footer {
    text-align: center;
    margin-top: 48px;
    font-size: 12px;
    color: var(--text-muted);
    animation: fadeUp 0.6s ease both 0.3s;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes bounceIn {
    0% { transform: scale(0.5); opacity: 0; }
    70% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .recipe-card-inner { padding: 18px 16px; gap: 14px; }
    .recipe-emoji-wrap { width: 60px; height: 60px; font-size: 28px; }
    .recipe-card-name { font-size: 19px; }
  }
  @media (min-width: 901px) {
    .container { padding: 0 24px 80px; }
  }
</style>
</head>
<body>

<div class="container">

  <div class="site-header">
      <div class="logo-wrap">
        <img src="logo.png" alt="Landie Recipe">
      </div>
    <p class="site-tagline" id="tagline">精選食譜 · Curated Recipes</p>
  </div>

  <div class="util-bar">
    <button class="lang-btn" id="lang-btn" onclick="toggleLang()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      <span id="lang-label">
        <span id="lang-opt-zh" class="lang-opt active">中</span>
        <span style="margin:0 4px;opacity:0.3">|</span>
        <span id="lang-opt-en" class="lang-opt">EN</span>
      </span>
    </button>
    <div class="font-ctrl">
      <button class="font-btn" id="font-dec" onclick="changeFontSize(-1)" title="縮小字體"><span class="fa">A</span><span class="fs">−</span></button>
      <button class="font-btn" id="font-inc" onclick="changeFontSize(1)" title="放大字體"><span class="fa">A</span><span class="fs">+</span></button>
    </div>
  </div>

  <div class="section-label" id="section-label">所有食譜 All Recipes</div>

  <div class="recipe-grid">

    <a class="recipe-card" href="muffins.html">
      <div class="recipe-card-inner">
        <div class="recipe-emoji-wrap">🧁</div>
        <div class="recipe-card-body">
          <div class="recipe-card-name" id="muffin-name">香蕉燕麥馬芬</div>
          <div class="recipe-card-sub">Banana Oat Muffins</div>
          <div class="recipe-chips">
            <span class="recipe-chip">🕐 <strong id="muffin-prep">10 分鐘</strong></span>
            <span class="recipe-chip">🔥 <strong id="muffin-bake">18–26 分鐘</strong></span>
            <span class="recipe-chip">🌾 <strong id="muffin-tag">燕麥健康</strong></span>
            <span class="recipe-chip">❄️ <strong id="muffin-store">冷凍 3 個月</strong></span>
          </div>
        </div>
        <div class="recipe-card-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>
    </a>

    <a class="recipe-card" href="cookies.html">
      <div class="recipe-card-inner">
        <div class="recipe-emoji-wrap">🍪</div>
        <div class="recipe-card-body">
          <div class="recipe-card-name" id="cookie-name">杏仁薄脆餅</div>
          <div class="recipe-card-sub">Almond Crispy Cookies</div>
          <div class="recipe-chips">
            <span class="recipe-chip">🕐 <strong id="cookie-prep">10 分鐘</strong></span>
            <span class="recipe-chip">🔥 <strong id="cookie-bake">15 分鐘</strong></span>
            <span class="recipe-chip">🌰 <strong id="cookie-tag">杏仁香氣</strong></span>
            <span class="recipe-chip">📦 <strong id="cookie-store">保存 2–3 週</strong></span>
          </div>
        </div>
        <div class="recipe-card-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>
    </a>

  </div>

  <div class="home-footer" id="home-footer">Landie Recipe · 用心做，用愛分享</div>

</div>

<script>
let lang = 'zh';
const FONT_SIZES = [0.9, 1, 1.12];
let fontSize = 1;

const TEXT = {
  tagline:      { zh:'精選食譜 · Curated Recipes',    en:'Curated Recipes · 精選食譜' },
  sectionLabel: { zh:'所有食譜 All Recipes',           en:'All Recipes · 所有食譜' },
  muffinName:   { zh:'香蕉燕麥馬芬',                   en:'Banana Oat Muffins' },
  muffinPrep:   { zh:'10 分鐘',                        en:'10 min' },
  muffinBake:   { zh:'18–26 分鐘',                    en:'18–26 min' },
  muffinTag:    { zh:'燕麥健康',                        en:'Wholesome Oats' },
  muffinStore:  { zh:'冷凍 3 個月',                    en:'Freeze 3 months' },
  cookieName:   { zh:'杏仁薄脆餅',                      en:'Almond Crispy Cookies' },
  cookiePrep:   { zh:'10 分鐘',                        en:'10 min' },
  cookieBake:   { zh:'15 分鐘',                        en:'15 min' },
  cookieTag:    { zh:'杏仁香氣',                        en:'Almond Aroma' },
  cookieStore:  { zh:'保存 2–3 週',                    en:'Keeps 2–3 weeks' },
  footer:       { zh:'Landie Recipe · 用心做，用愛分享', en:'Landie Recipe · Made with heart' },
};

function applyLang() {
  const t = k => TEXT[k][lang];
  document.getElementById('tagline').textContent       = t('tagline');
  document.getElementById('section-label').textContent = t('sectionLabel');
  document.getElementById('muffin-name').textContent   = t('muffinName');
  document.getElementById('muffin-prep').textContent   = t('muffinPrep');
  document.getElementById('muffin-bake').textContent   = t('muffinBake');
  document.getElementById('muffin-tag').textContent    = t('muffinTag');
  document.getElementById('muffin-store').textContent  = t('muffinStore');
  document.getElementById('cookie-name').textContent   = t('cookieName');
  document.getElementById('cookie-prep').textContent   = t('cookiePrep');
  document.getElementById('cookie-bake').textContent   = t('cookieBake');
  document.getElementById('cookie-tag').textContent    = t('cookieTag');
  document.getElementById('cookie-store').textContent  = t('cookieStore');
  document.getElementById('home-footer').textContent   = t('footer');
  document.getElementById('lang-opt-zh').className = lang === 'zh' ? 'lang-opt active' : 'lang-opt';
  document.getElementById('lang-opt-en').className = lang === 'en' ? 'lang-opt active' : 'lang-opt';
}

function toggleLang() {
  lang = lang === 'zh' ? 'en' : 'zh';
  applyLang();
}

function changeFontSize(dir) {
  fontSize = Math.max(0, Math.min(FONT_SIZES.length - 1, fontSize + dir));
  document.body.style.zoom = FONT_SIZES[fontSize];
  updateFontBtns();
}

function updateFontBtns() {
  document.getElementById('font-dec').classList.toggle('at-limit', fontSize === 0);
  document.getElementById('font-inc').classList.toggle('at-limit', fontSize === FONT_SIZES.length - 1);
}

applyLang();
updateFontBtns();
</script>
</body>
</html>
